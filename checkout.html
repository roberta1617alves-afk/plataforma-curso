<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout</title>
  <script src="config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #FAFAF9; color: #1C1917; min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border: 1px solid #E7E5E4; border-radius: 16px; padding: 36px 32px; max-width: 440px; width: 100%; box-shadow: 0 4px 32px rgba(0,0,0,.06); }
    .logo { font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: #78716C; margin-bottom: 24px; }
    .course-name { font-size: 1.35rem; font-weight: 800; line-height: 1.25; margin-bottom: 8px; }
    .price-tag { font-size: 2rem; font-weight: 800; color: #1C1917; margin-bottom: 6px; }
    .price-tag span { font-size: 1rem; font-weight: 500; color: #78716C; }
    .desc { font-size: .875rem; color: #78716C; line-height: 1.6; margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid #E7E5E4; }
    .fgroup { margin-bottom: 14px; }
    label { display: block; font-size: .78rem; font-weight: 700; color: #78716C; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em; }
    input { width: 100%; padding: 11px 14px; border: 1.5px solid #E7E5E4; border-radius: 8px; font-size: .9rem; font-family: inherit; outline: none; background: #FAFAF9; color: #1C1917; transition: border .15s; }
    input:focus { border-color: #1C1917; background: #fff; }
    .btn { width: 100%; padding: 14px; background: #009EE3; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 20px; transition: opacity .15s; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn:hover { opacity: .9; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .mp-logo { font-size: .75rem; opacity: .7; }
    .error { color: #DC2626; font-size: .82rem; margin-top: 10px; text-align: center; }
    .seguro { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 14px; font-size: .75rem; color: #78716C; }
    .loading { text-align: center; padding: 40px; color: #78716C; }
    .spinner { width: 24px; height: 24px; border: 2.5px solid #E7E5E4; border-top-color: #1C1917; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card" id="cardContent">
  <div class="loading"><div class="spinner"></div>Carregando...</div>
</div>

<script>
const params = new URLSearchParams(location.search)
const courseId = params.get('course')

async function init() {
  if (!courseId) { showError('Link inválido. Nenhum curso selecionado.'); return }

  // Busca nome e preço via API server-side (sem depender de autenticação)
  let courseData
  try {
    const res = await fetch(`/api/checkout?courseId=${encodeURIComponent(courseId)}`)
    courseData = await res.json()
  } catch { showError('Erro de conexão. Recarregue a página.'); return }

  if (!courseData || courseData.erro) { showError(courseData?.erro || 'Curso não encontrado.'); return }

  const price = courseData.price
  if (!price) { showError('Preço não configurado para este curso. Entre em contato com a administradora.'); return }

  const fmt = n => n.toLocaleString('pt-BR', { minimumFractionDigits: 2 })

  document.getElementById('cardContent').innerHTML = `
    <div class="logo">${window.SITE_NAME || ''}</div>
    <div class="course-name">${courseData.name}</div>
    <div class="price-tag">R$ ${fmt(price)} <span>/ acesso completo</span></div>
    <div class="desc">Acesso imediato após o pagamento. Você receberá as credenciais de acesso no seu e-mail.</div>

    <div class="fgroup">
      <label>Seu nome</label>
      <input type="text" id="payerName" placeholder="Maria Silva" autocomplete="name" />
    </div>
    <div class="fgroup">
      <label>Seu e-mail</label>
      <input type="email" id="payerEmail" placeholder="seuemail@email.com" autocomplete="email" />
    </div>

    <button class="btn" id="btnPay" onclick="pagar('${courseId}')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="4" fill="#fff" fill-opacity=".2"/><path d="M4 8h16v8H4z" fill="currentColor" opacity=".3"/><path d="M4 8h16" stroke="currentColor" stroke-width="1.5"/></svg>
      Pagar com Mercado Pago
    </button>
    <div class="error" id="errMsg" style="display:none"></div>
    <div class="seguro">🔒 Pagamento 100% seguro via Mercado Pago</div>`
}

async function pagar(courseId) {
  const name = document.getElementById('payerName').value.trim()
  const email = document.getElementById('payerEmail').value.trim()
  const errEl = document.getElementById('errMsg')
  const btn = document.getElementById('btnPay')

  errEl.style.display = 'none'
  if (!name) { errEl.textContent = 'Por favor, informe seu nome.'; errEl.style.display = 'block'; return }
  if (!email || !email.includes('@')) { errEl.textContent = 'Por favor, informe um e-mail válido.'; errEl.style.display = 'block'; return }

  btn.disabled = true
  btn.textContent = 'Redirecionando...'

  try {
    const params = new URLSearchParams({ courseId, payerName: name, payerEmail: email })
    const res = await fetch('/api/checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: params.toString()
    })
    let json
    try { json = await res.json() } catch { json = {} }
    if (json.initPoint) {
      window.location.href = json.initPoint
    } else {
      errEl.textContent = json.erro || 'Erro ao iniciar pagamento. Tente novamente.'
      errEl.style.display = 'block'
      btn.disabled = false
      btn.textContent = 'Pagar com Mercado Pago'
    }
  } catch {
    errEl.textContent = 'Erro de conexão. Tente novamente.'
    errEl.style.display = 'block'
    btn.disabled = false
    btn.textContent = 'Pagar com Mercado Pago'
  }
}

function showError(msg) {
  document.getElementById('cardContent').innerHTML = `<div style="text-align:center;padding:20px"><div style="font-size:2rem;margin-bottom:12px">⚠️</div><p style="color:#78716C">${msg}</p></div>`
}

init()
</script>
</body>
</html>
