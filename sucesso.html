<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagamento confirmado!</title>
  <script src="config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #FAFAF9; color: #1C1917; min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border: 1px solid #E7E5E4; border-radius: 16px; padding: 48px 36px; max-width: 440px; width: 100%; text-align: center; box-shadow: 0 4px 32px rgba(0,0,0,.06); }
    .icon { font-size: 3.5rem; margin-bottom: 20px; }
    h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: 10px; }
    p { font-size: .9rem; color: #78716C; line-height: 1.7; margin-bottom: 28px; }
    .btn { display: inline-block; padding: 13px 28px; background: #1C1917; color: #fff; border-radius: 8px; font-size: .9rem; font-weight: 700; text-decoration: none; }
    .note { font-size: .78rem; color: #A8A29E; margin-top: 16px; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">🎉</div>
  <h1>Pagamento confirmado!</h1>
  <p>Seu acesso foi liberado. Em instantes você receberá um e-mail com seus dados de acesso ao curso.<br><br>Verifique também sua caixa de spam caso não encontre o e-mail.</p>
  <a href="/login.html" class="btn">Acessar o curso →</a>
  <div class="note">Seu e-mail e senha chegam em até 2 minutos.</div>
</div>
</body>
</html>
