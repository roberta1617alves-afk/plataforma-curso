<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plataforma Roberta Alves</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F8F4EF; --surface: #FFFFFF; --border: #E3DDD6;
      --text: #1A1208; --muted: #7A6E65; --light: #F0EAE1;
      --accent: #25D366; --accent-h: #1DAE52; --accent-light: #E6F9EE;
      --green: #25D366; --green-bg: #E6F9EE; --green-border: #86EFAC;
      --danger: #DC2626;
      --sidebar-bg: #515132; --sidebar-text: #F5F5E8; --sidebar-muted: #C8C8A0;
      --sidebar-border: rgba(255,255,255,0.12); --sidebar-active-bg: rgba(255,255,255,0.13);
      --num-bg: #B8956A;
      --sidebar-w: 290px; --header-h: 60px; --radius: 8px;
    }
    body { font-family:'Inter','Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; }

    /* AUTH GATE */
    #authGate { position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999; }
    .spinner { width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* HEADER */
    header { position:fixed;top:0;left:0;right:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);box-shadow:0 1px 8px rgba(26,18,8,.06); }
    .header-main { height:var(--header-h);display:flex;align-items:center;padding:0 16px;gap:10px; }
    .btn-menu { display:flex;align-items:center;background:none;border:none;cursor:pointer;padding:6px;border-radius:6px;color:var(--muted); }
    .btn-menu:hover { background:var(--light); }
    .btn-menu svg { width:20px;height:20px;display:block; }
    .logo { font-family:'Playfair Display',Georgia,serif;font-size:1.05rem;font-weight:700;font-style:italic;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .header-right { display:flex;align-items:center;gap:8px; }
    .user-chip { display:flex;align-items:center;gap:7px;padding:4px 10px 4px 5px;border-radius:99px;border:1px solid var(--border); }
    .avatar { width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;flex-shrink:0; }
    .user-email { font-size:.78rem;color:var(--muted); }
    .btn-sm { padding:6px 13px;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:inherit;transition:all .12s; }
    .btn-sm:hover { background:var(--light);color:var(--text); }
    .btn-sm.active { background:var(--accent);color:#fff;border-color:var(--accent); }

    /* PROGRESS BAR */
    .progress-bar-wrap { height:3px;background:var(--border); }
    .progress-bar-fill { height:100%;background:var(--green);transition:width .4s ease; }

    /* LAYOUT */
    .layout { display:flex;padding-top:calc(var(--header-h) + 3px);min-height:100dvh; }

    /* SIDEBAR */
    aside { width:var(--sidebar-w);position:fixed;top:calc(var(--header-h)+3px);left:0;bottom:0;background:var(--sidebar-bg);border-right:none;overflow-y:auto;z-index:90;transition:transform .22s ease;display:flex;flex-direction:column; }

    /* Sidebar Brand */
    .sidebar-brand { padding:20px 18px 12px; border-bottom:1px solid var(--sidebar-border); }
    .sidebar-brand-name { font-family:'Playfair Display',Georgia,serif;font-size:1rem;font-weight:700;font-style:italic;color:#fff;line-height:1.25;margin-bottom:4px; }
    .sidebar-course-name { font-size:.72rem;color:var(--sidebar-muted);font-weight:500;letter-spacing:.02em;text-transform:uppercase; }

    /* Sidebar Progress */
    .sidebar-progress-wrap { padding:10px 18px 14px;border-bottom:1px solid var(--sidebar-border); }
    .sidebar-progress-label-row { display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--sidebar-muted); }
    .sidebar-prog-bar { height:4px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden; }
    .sidebar-prog-fill { height:100%;background:var(--accent);border-radius:99px;transition:width .4s ease; }

    .sidebar-search { padding:12px 12px 8px; }
    .search-input { width:100%;padding:8px 12px;border:1.5px solid rgba(255,255,255,.12);border-radius:6px;font-size:.82rem;font-family:inherit;outline:none;background:rgba(255,255,255,.07);color:var(--sidebar-text);transition:border .15s; }
    .search-input:focus { border-color:var(--accent);background:rgba(255,255,255,.1); }
    .search-input::placeholder { color:var(--sidebar-muted); }

    .sidebar-overview-btn { margin:0 12px 6px;padding:9px 12px;background:rgba(255,255,255,.06);border:1px solid var(--sidebar-border);border-radius:var(--radius);font-size:.82rem;font-weight:600;color:var(--sidebar-text);cursor:pointer;font-family:inherit;transition:all .12s;text-align:left; }
    .sidebar-overview-btn:hover { background:var(--sidebar-active-bg);border-color:rgba(37,211,102,.3); }
    .sidebar-overview-btn.active { background:var(--sidebar-active-bg);border-color:var(--accent);color:var(--accent); }

    .module-section { margin-bottom:4px; }
    .module-header { padding:10px 16px 4px;font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--sidebar-muted);display:flex;align-items:center;justify-content:space-between; }
    .module-progress-text { font-size:.63rem;color:var(--sidebar-muted);font-weight:400;letter-spacing:0; }
    .lesson-list { list-style:none;padding:0 8px; }
    .lesson-btn { width:100%;background:none;border:none;text-align:left;padding:7px 10px;cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:10px;transition:background .1s;font-family:inherit;border-left:3px solid transparent; }
    .lesson-btn:hover { background:rgba(255,255,255,.06); }
    .lesson-btn.active { background:var(--sidebar-active-bg);border-left-color:var(--accent); }
    .lesson-num { min-width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:.63rem;font-weight:700;color:var(--sidebar-muted);flex-shrink:0;transition:all .15s; }
    .lesson-btn.active .lesson-num { background:var(--accent);color:#fff; }
    .lesson-btn.done .lesson-num { background:var(--accent);color:#fff; }
    .lesson-info { flex:1;min-width:0; }
    .lesson-name { font-size:.82rem;font-weight:500;color:var(--sidebar-text);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .lesson-meta { font-size:.7rem;color:var(--sidebar-muted);margin-top:2px; }
    .lesson-actions { display:none;gap:2px; }
    .admin-mode .lesson-actions { display:flex; }
    .icon-btn { background:none;border:none;cursor:pointer;padding:3px 5px;border-radius:5px;font-size:.8rem;color:var(--sidebar-muted);line-height:1;transition:all .1s; }
    .icon-btn:hover { background:rgba(255,255,255,.1);color:var(--sidebar-text); }
    .icon-btn.danger:hover { color:#FCA5A5; }
    .sidebar-footer { padding:8px 12px 16px;margin-top:auto; }
    .btn-new-lesson { display:none;width:100%;padding:8px 12px;background:none;color:var(--sidebar-muted);border:1.5px dashed rgba(255,255,255,.15);border-radius:6px;font-size:.82rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .12s;margin-bottom:6px; }
    .btn-new-lesson:hover { border-color:var(--accent);color:var(--accent); }
    .btn-new-module { display:none;width:100%;padding:8px 12px;background:none;color:var(--sidebar-muted);border:1.5px dashed rgba(255,255,255,.15);border-radius:6px;font-size:.82rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .12s; }
    .btn-new-module:hover { border-color:var(--accent);color:var(--accent); }
    .admin-mode .btn-new-lesson,.admin-mode .btn-new-module { display:block; }

    /* MAIN */
    main { margin-left:var(--sidebar-w);flex:1;padding:32px 28px;max-width:calc(var(--sidebar-w) + 860px); }

    /* ── OVERVIEW PAGE ── */
    .overview { display:flex;flex-direction:column;gap:24px; }

    /* Banner */
    .banner { background:#35351F;border-radius:16px;padding:36px;display:flex;align-items:center;gap:32px;overflow:hidden;position:relative; }
    .banner::before { content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 60%);z-index:0; }
    .banner-content { flex:1;z-index:1;min-width:0; }
    .banner-tag { font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);margin-bottom:10px; }
    .banner-title { font-family:'Playfair Display',Georgia,serif;font-size:1.8rem;font-weight:700;font-style:italic;color:#fff;line-height:1.2;margin-bottom:10px; }
    .banner-instructor { font-size:.88rem;color:rgba(255,255,255,.6);margin-bottom:22px; }
    .banner-stats { display:flex;gap:24px;flex-wrap:wrap; }
    .banner-stat { text-align:center; }
    .banner-stat-val { font-family:'Playfair Display',Georgia,serif;font-size:1.5rem;font-weight:700;color:#fff;line-height:1; }
    .banner-stat-label { font-size:.68rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.07em;margin-top:3px; }
    .banner-photo { width:120px;height:120px;border-radius:50%;border:3px solid rgba(37,211,102,.3);object-fit:cover;flex-shrink:0;z-index:1;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;overflow:hidden; }
    .banner-photo img { width:100%;height:100%;object-fit:cover; }
    .banner-photo-placeholder { font-size:2.5rem;color:rgba(255,255,255,.3); }
    .btn-continue { display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;padding:11px 22px;border-radius:8px;font-size:.88rem;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s; }
    .btn-continue:hover { background:var(--accent-h); }

    /* Stats cards */
    .stats-row { display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px; }
    .stat-card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px; }
    .stat-card-val { font-family:'Playfair Display',Georgia,serif;font-size:1.7rem;font-weight:700;color:var(--text);line-height:1; }
    .stat-card-label { font-size:.75rem;color:var(--muted);margin-top:6px; }
    .stat-card.green { border-color:var(--green-border);background:var(--green-bg); }
    .stat-card.green .stat-card-val { color:var(--green); }

    /* Progress overview */
    .progress-section { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px; }
    .progress-section h3 { font-size:.85rem;font-weight:600;margin-bottom:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em; }
    .progress-track { background:var(--border);border-radius:99px;height:8px;overflow:hidden;margin-bottom:8px; }
    .progress-track-fill { height:100%;background:var(--green);border-radius:99px;transition:width .4s ease; }
    .progress-label { font-size:.8rem;color:var(--muted); }

    /* Instructor card */
    .instructor-card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px 24px;display:flex;align-items:center;gap:18px; }
    .instructor-avatar { width:60px;height:60px;border-radius:50%;background:var(--light);flex-shrink:0;object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:var(--muted);overflow:hidden;border:2px solid var(--border); }
    .instructor-avatar img { width:100%;height:100%;object-fit:cover; }
    .instructor-name { font-family:'Playfair Display',Georgia,serif;font-size:1.05rem;font-weight:700;color:var(--text); }
    .instructor-title { font-size:.78rem;color:var(--accent);margin-top:3px;font-weight:600; }
    .instructor-bio { font-size:.85rem;color:var(--muted);margin-top:8px;line-height:1.65; }
    .btn-edit-instructor { display:none;margin-left:auto;flex-shrink:0; }
    .admin-mode .btn-edit-instructor { display:block; }

    /* Lesson cards (overview) */
    .overview-header { padding-bottom:4px; }
    .overview-header h1 { font-family:'Playfair Display',Georgia,serif;font-size:1.55rem;font-weight:700;color:var(--text);margin-bottom:4px; }
    .overview-header p { font-size:.85rem;color:var(--muted); }
    .module-sep { display:flex;align-items:center;gap:12px;padding:4px 0 8px;margin-top:8px; }
    .module-sep-label { font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);white-space:nowrap; }
    .module-sep-line { flex:1;height:1px;background:var(--border); }
    .lesson-cards-list { display:flex;flex-direction:column;gap:10px; }
    .lesson-card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .15s;position:relative; }
    .lesson-card:hover { border-color:var(--accent);box-shadow:0 2px 12px rgba(37,211,102,.1);transform:translateY(-1px); }
    .lesson-card-num-box { display:flex;flex-direction:column;align-items:center;justify-content:center;width:52px;height:60px;background:var(--num-bg);border-radius:8px;flex-shrink:0; }
    .lesson-card-num-val { font-family:'Playfair Display',Georgia,serif;font-size:1.4rem;font-weight:700;font-style:italic;color:#fff;line-height:1; }
    .lesson-card-num-label { font-size:.5rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-top:2px; }
    .lesson-card-body { flex:1;min-width:0; }
    .lesson-card-module { font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:4px; }
    .lesson-card-title { font-family:'Playfair Display',Georgia,serif;font-size:.97rem;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:4px; }
    .lesson-card-desc { font-size:.78rem;color:var(--muted);line-height:1.5; }
    .lesson-card-footer { display:flex;align-items:center;gap:10px;margin-top:6px; }
    .lesson-card-badge { display:inline-flex;align-items:center;gap:4px;font-size:.65rem;font-weight:700;color:var(--accent);letter-spacing:.04em; }
    .lesson-card-arrow { margin-left:auto;font-size:1.2rem;color:var(--muted);flex-shrink:0;transition:transform .15s; }
    .lesson-card:hover .lesson-card-arrow { transform:translateX(3px);color:var(--accent); }
    .lesson-card.done-card { opacity:.8; }
    .lesson-card.done-card .lesson-card-num-box { background:#6B9F7A; }
    .lesson-card.locked-card { opacity:.5;cursor:not-allowed; }
    .lesson-card.locked-card:hover { border-color:var(--border);box-shadow:none;transform:none; }
    .lesson-card.locked-card .lesson-card-num-box { background:#aaa; }
    .lesson-card.locked-card .lesson-card-arrow { transform:none!important;color:var(--muted)!important; }

    /* Modules overview - fallback */
    .modules-overview h3 { font-size:.85rem;font-weight:600;margin-bottom:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em; }
    .module-cards { display:flex;flex-direction:column;gap:8px; }
    .module-card { background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .12s; }
    .module-card:hover { border-color:var(--accent);background:var(--light); }
    .module-card-icon { width:36px;height:36px;border-radius:8px;background:var(--light);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0; }
    .module-card-info { flex:1;min-width:0; }
    .module-card-title { font-size:.875rem;font-weight:600; }
    .module-card-meta { font-size:.75rem;color:var(--muted);margin-top:2px; }
    .module-card-progress { font-size:.75rem;font-weight:700;color:var(--green); }

    /* ── STUDENT HERO ── */
    .student-hero { background:linear-gradient(160deg,#35351F 0%,#515132 50%,#6A6A42 100%);margin:-24px -24px 0;padding:52px 28px 44px;text-align:center;position:relative;overflow:hidden; }
    @media(max-width:640px){ .student-hero { margin:-16px -16px 0;padding:44px 20px 36px; } }
    .student-hero::before { content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 40%,rgba(255,255,255,.07) 0%,transparent 65%);pointer-events:none; }
    .hero-brand { font-size:.6rem;font-weight:700;letter-spacing:.22em;color:rgba(255,255,255,.45);text-transform:uppercase;display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px; }
    .hero-brand::before,.hero-brand::after { content:'';flex:1;max-width:36px;height:1px;background:rgba(255,255,255,.22); }
    .hero-eyebrow { font-size:.62rem;font-weight:700;letter-spacing:.16em;color:rgba(255,255,255,.5);text-transform:uppercase;margin-bottom:10px; }
    .hero-title { font-family:'Playfair Display',Georgia,serif;font-size:2rem;font-weight:900;color:#fff;line-height:1.18;margin-bottom:18px; }
    .hero-title em { font-style:italic;font-weight:400; }
    @media(max-width:400px){ .hero-title { font-size:1.6rem; } }
    .hero-desc { font-size:.88rem;color:rgba(255,255,255,.68);line-height:1.75;max-width:460px;margin:0 auto 32px; }
    .hero-instructor { display:flex;flex-direction:column;align-items:center;gap:10px; }
    .hero-avatar { width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.18);border:2.5px solid rgba(255,255,255,.28);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.2rem;color:#fff;overflow:hidden;flex-shrink:0; }
    .hero-avatar img { width:100%;height:100%;object-fit:cover; }
    .hero-instructor-name { font-size:.84rem;color:rgba(255,255,255,.7); }
    .hero-btn-continue { margin:0 auto 28px;display:block;padding:12px 28px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.35);border-radius:99px;color:#fff;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.02em;transition:all .15s;backdrop-filter:blur(4px); }
    .hero-btn-continue:hover { background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.6); }

    /* ── STUDENT PROGRESS ── */
    .student-body { padding:28px 0 0; }
    .s-progress-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:8px; }
    .s-progress-label { font-size:.6rem;font-weight:700;letter-spacing:.14em;color:var(--muted);text-transform:uppercase; }
    .s-progress-pct { font-size:.85rem;font-weight:700;color:#515132; }
    .s-progress-bar { height:5px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:22px; }
    .s-progress-fill { height:100%;background:#515132;border-radius:99px;transition:width .4s ease; }
    /* Module dots */
    .module-dots { display:flex;overflow-x:auto;padding-bottom:8px;scrollbar-width:none; }
    .module-dots::-webkit-scrollbar { display:none; }
    .mod-dot-item { display:flex;flex-direction:column;align-items:center;gap:5px;min-width:56px;flex:1; }
    .mod-dot { width:34px;height:34px;border-radius:50%;background:var(--light);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;border:2px solid var(--border);transition:all .2s;cursor:pointer; }
    .mod-dot:hover { border-color:#515132; }
    .mod-dot.done { background:#EAEBDA;color:#515132;border-color:#515132; }
    .mod-dot.active { background:#515132;color:#fff;border-color:#515132; }
    .mod-dot-label { font-size:.5rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);text-align:center;line-height:1.2; }
    /* Student lesson cards */
    .s-module-sep { font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);padding:20px 0 10px;border-bottom:1px solid var(--border);margin-bottom:12px; }
    .s-lesson-card { background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .15s;margin-bottom:10px; }
    .s-lesson-card:hover { border-color:#515132;box-shadow:0 2px 12px rgba(81,81,50,.1);transform:translateY(-1px); }
    .s-lesson-num { display:flex;flex-direction:column;align-items:center;justify-content:center;width:50px;height:58px;background:#515132;border-radius:8px;flex-shrink:0; }
    .s-lesson-num.done { background:#8A8A60; }
    .s-lesson-num-val { font-family:'Playfair Display',Georgia,serif;font-size:1.3rem;font-weight:700;font-style:italic;color:#fff;line-height:1; }
    .s-lesson-num-lbl { font-size:.45rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.65);margin-top:2px; }
    .s-lesson-body { flex:1;min-width:0; }
    .s-lesson-mod { font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#515132;margin-bottom:3px; }

    .s-lesson-desc { font-size:.76rem;color:var(--muted);line-height:1.5; }

    /* ── ACESSO RÁPIDO ── */
    .quick-section { margin-top:24px; }

    .quick-card:hover { border-color:#515132;background:#F5F5E8;transform:translateY(-2px);box-shadow:0 4px 16px rgba(81,81,50,.1); }

    .quick-admin-url { font-size:.7rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }

    /* Completion */
    .completion-banner { background:var(--green-bg);border:1.5px solid var(--green-border);border-radius:12px;padding:24px;text-align:center;display:none; }
    .completion-banner.show { display:block; }
    .completion-banner h3 { font-family:'Playfair Display',Georgia,serif;font-size:1.1rem;font-weight:700;color:var(--green);margin-bottom:6px; }
    .completion-banner p { font-size:.875rem;color:#166534; }

    /* ── LESSON VIEW ── */
    .lesson-view { display:flex;flex-direction:column;gap:20px; }
    .lesson-header { display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap; }

    .lesson-desc-text { font-size:.875rem;color:var(--muted);margin-top:5px; }
    .lesson-duration { font-size:.75rem;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:4px; }

    /* Video */

    .btn-complete:hover { border-color:var(--green);color:var(--green);background:var(--green-bg); }
    .btn-complete.done { background:var(--green-bg);border-color:var(--green);color:var(--green); }
    .nav-btns { display:flex;gap:8px; }

    /* Tabs */
    .tabs { display:flex;border-bottom:1.5px solid var(--border);gap:0; }
    .tab-btn { padding:10px 18px;font-size:.875rem;font-weight:600;background:none;border:none;cursor:pointer;color:var(--muted);font-family:inherit;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;transition:all .12s; }
    .tab-btn:hover { color:var(--text); }
    .tab-btn.active { color:var(--text);border-bottom-color:var(--accent); }

    /* Card */
    .card { background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden; }

    .mat-textarea:focus { border-color:var(--accent);background:var(--surface); }
    /* Editor rico de material */
    .mat-toolbar { display:flex;gap:4px;padding:8px 10px;background:var(--light);border:1.5px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;flex-wrap:wrap;align-items:center; }
    .mat-tool-btn { padding:4px 9px;border:1px solid var(--border);background:var(--surface);border-radius:5px;cursor:pointer;font-size:.8rem;font-family:inherit;transition:background .12s;line-height:1.5;user-select:none; }
    .mat-tool-btn:hover { background:var(--accent-light);border-color:var(--green-border); }
    .mat-tool-sep { width:1px;height:18px;background:var(--border);margin:0 3px;flex-shrink:0; }
    .mat-color-wrap { position:relative;display:inline-flex; }
    .mat-color-btn { padding:4px 9px;border:1px solid var(--border);background:var(--surface);border-radius:5px;cursor:pointer;font-size:.8rem;font-family:inherit;transition:background .12s;line-height:1.5;user-select:none;display:flex;align-items:center;gap:5px; }

    .mat-color-swatch:hover { transform:scale(1.2);border-color:rgba(0,0,0,.3); }
    .mat-select-btn { padding:4px 8px;border:1px solid var(--border);background:var(--surface);border-radius:5px;cursor:pointer;font-size:.78rem;font-family:inherit;line-height:1.5;user-select:none;transition:background .12s; }
    .mat-select-btn:hover { background:var(--accent-light);border-color:var(--green-border); }

    .mat-editor:focus { border-color:var(--accent); }

    /* Caixa de destaque (callout) */
    .callout { background:#E8F8F0;border-left:4px solid var(--accent);border-radius:0 8px 8px 0;padding:14px 18px;margin:12px 0; }
    .callout p, .callout div { margin:2px 0; }

    /* Links */
    .links-list { list-style:none;display:flex;flex-direction:column;gap:6px; }
    .link-row { display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:8px;border:1px solid var(--border); }
    .link-content { flex:1;min-width:0; }

    .link-url a { font-size:.875rem;color:var(--accent);text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block; }
    .link-url a:hover { text-decoration:underline; }
    .add-link-form { display:none;flex-direction:column;gap:8px;margin-top:12px; }

    .add-link-row input:focus { border-color:var(--accent);background:var(--surface); }
    .add-link-row input::placeholder { color:#A8A29E; }

    /* Notes */
    .notes-textarea { width:100%;min-height:160px;padding:14px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;line-height:1.7;font-family:inherit;resize:vertical;outline:none;background:var(--bg);color:var(--text);transition:border .15s; }
    .notes-textarea:focus { border-color:var(--accent);background:var(--surface); }
    .notes-hint { font-size:.75rem;color:var(--muted);margin-top:8px; }
    .notes-saved { font-size:.75rem;color:var(--green);margin-top:6px;opacity:0;transition:opacity .3s; }
    .notes-saved.show { opacity:1; }

    /* Prev/Next nav */
    .lesson-nav { display:flex;justify-content:space-between;gap:12px;margin-top:4px; }
    .nav-card { flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;cursor:pointer;font-family:inherit;text-align:left;transition:all .12s;display:flex;align-items:center;gap:10px; }
    .nav-card:hover { border-color:var(--accent);background:var(--light); }
    .nav-card.next { text-align:right;flex-direction:row-reverse; }
    .nav-card-label { font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em; }
    .nav-card-title { font-size:.85rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .nav-arrow { font-size:1.1rem;color:var(--muted);flex-shrink:0; }
    .nav-card:disabled { opacity:.3;cursor:not-allowed; }
    .nav-card:disabled:hover { border-color:var(--border);background:var(--surface); }

    /* Buttons */
    .btn { padding:9px 18px;border-radius:6px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .12s; }
    .btn-dark { background:var(--accent);color:#fff; }
    .btn-dark:hover { background:var(--accent-h); }
    .btn-outline { background:var(--surface);color:var(--muted);border:1px solid var(--border); }
    .btn-outline:hover { background:var(--light);color:var(--text); }
    .save-row { display:flex;gap:8px;justify-content:flex-end;margin-top:10px; }
    .edit-row { display:flex;justify-content:flex-end;margin-top:10px; }

    /* MODAL */
    .overlay { position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center;padding:20px; }
    .overlay.open { display:flex; }
    .modal { background:var(--surface);border-radius:14px;width:100%;max-width:460px;box-shadow:0 24px 64px rgba(0,0,0,.15);max-height:90dvh;overflow-y:auto; }
    .modal-head { padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1; }
    .modal-head h3 { font-size:1rem;font-weight:700; }
    .modal-x { background:none;border:none;cursor:pointer;color:var(--muted);font-size:1.3rem;line-height:1;padding:2px 6px;border-radius:5px; }

    .modal-body { padding:22px;display:flex;flex-direction:column;gap:14px; }
    .modal-foot { padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end; }
    .fgroup { display:flex;flex-direction:column;gap:6px; }
    .fgroup label { font-size:.73rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em; }

    .fgroup input:focus,.fgroup textarea:focus,.fgroup select:focus { border-color:var(--accent);background:var(--surface); }
    .fgroup input::placeholder { color:#A8A29E; }

    /* BACKDROP */
    .backdrop { display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:85; }

    /* UPLOAD */

    .video-empty-state svg { opacity:.35; }
    .video-empty-state p { font-size:.82rem; }

    .students-page { display:flex;flex-direction:column;gap:20px; }

    .bulk-textarea:focus { border-color:var(--accent);background:var(--surface); }
    .sidebar-students-btn { margin:0 12px 6px;padding:9px 12px;background:rgba(255,255,255,.06);border:1px solid var(--sidebar-border);border-radius:var(--radius);font-size:.82rem;font-weight:600;color:var(--sidebar-text);cursor:pointer;font-family:inherit;transition:all .12s;text-align:left;display:none; }

    @media (max-width:768px) {

      .lesson-header h1 { font-size:1.2rem; }

      aside { transform:translateX(0) !important; }
      .backdrop { display:none !important; }
    }
  </style>
</head>

<script>
const { createClient } = supabase
const db = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY)
let currentUser = null

// ── DATA ──
const DEFAULTS = {
  instructor: { name: 'Roberta Alves', title: 'Mentora de IA', bio: '', photo: '' },
  modules: [],
  lessons: [],
  progress: {}
}

let data = structuredClone(DEFAULTS)
let currentLessonId = null
let editingLessonId = null
let editingModuleId = null
let adminMode = false
let activeTab = 'material'
let editingMat = false
let notesSaveTimer = null
let currentCourseId = null
let currentCourseName = null
let saveTimer = null
let studentsPreselectedCourse = null  // Curso pré-selecionado ao abrir a página de alunas
let coursesCache = []  // Cache dos cursos carregados (inclui data, evita re-fetch com RLS)

function save() {
  clearTimeout(saveTimer)
  saveTimer = setTimeout(syncCourseToSupabase, 800)
}

async function syncCourseToSupabase() {
  if (!currentCourseId || !isAdmin) return
  try {
    const { data: { session } } = await db.auth.getSession()
    // Preserva o preço salvo no cache ao sincronizar conteúdo do curso
    const cachedPrice = coursesCache.find(c => c.id === currentCourseId)?.data?.price
    const payload = { instructor: data.instructor, modules: data.modules, lessons: data.lessons, quickLinks: data.quickLinks || [], courseDesc: data.courseDesc || '' }
    if (cachedPrice) payload.price = cachedPrice
    await fetch('/api/courses', {
      method: 'PUT',
      headers: { Authorization: `Bearer ${session?.access_token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: currentCourseId, data: payload })
    })
    // Atualiza cache local para que selectCourse use dados frescos
    const cached = coursesCache.find(c => c.id === currentCourseId)
    if (cached) cached.data = payload
  } catch (e) { console.error('Erro ao salvar no servidor:', e) }
}
const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2)

// ── UTILS ──
function getEmbed(url) {
  if (!url) return null
  try {
    const u = new URL(url)
    if (u.hostname.includes('youtube.com')) { const v = u.searchParams.get('v'); return v ? `https://www.youtube.com/embed/${v}?rel=0` : null }
    if (u.hostname.includes('youtu.be')) { const v = u.pathname.slice(1); return v ? `https://www.youtube.com/embed/${v}?rel=0` : null }
    if (u.hostname.includes('vimeo.com')) { const v = u.pathname.replace('/', ''); return v ? `https://player.vimeo.com/video/${v}` : null }
  } catch {}
  return null
}

function toast(msg, ms = 2200) {
  const el = document.getElementById('toast')
  el.textContent = msg; el.classList.add('show')
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), ms)
}

function getProgress() {
  const total = data.lessons.length
  const done  = data.lessons.filter(l => data.progress[l.id]?.completed).length
  return { total, done, pct: total ? Math.round(done / total * 100) : 0 }
}

function getLessonIndex(id) { return data.lessons.findIndex(l => l.id === id) }

function getModuleLessons(moduleId) {
  return moduleId === '__none__'
    ? data.lessons.filter(l => !l.moduleId)
    : data.lessons.filter(l => l.moduleId === moduleId)
}

// ── UPLOAD direto via servidor (service key, bypassa RLS e config de bucket) ──
async function uploadFile(file, path, bucket = window.STORAGE_BUCKET) {
  const MAX_MB = 4
  if (file.size > MAX_MB * 1024 * 1024) {
    throw new Error(`Arquivo muito grande (máximo ${MAX_MB} MB). Para vídeos use o campo de link do YouTube/Vimeo ou suba o arquivo pela seção de vídeo.`)
  }
  // Converte para base64
  const base64 = await new Promise((resolve, reject) => {
    const reader = new FileReader()
    reader.onload  = e => resolve(e.target.result.split(',')[1])
    reader.onerror = reject
    reader.readAsDataURL(file)
  })
  const { data: { session } } = await db.auth.getSession()
  const accessToken = session?.access_token
  const res = await fetch('/api/upload', {
    method: 'POST',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ bucket, path, base64, contentType: file.type })
  })
  const json = await res.json().catch(() => ({}))
  if (!res.ok) throw new Error(json.erro || 'Erro ao fazer upload')
  return json.url
}

// ── VIDEO URL (signed, expira em 2h) ──
async function getVideoUrl(videoValue) {
  if (!videoValue) return null
  // YouTube / Vimeo — usa embed normal
  if (videoValue.startsWith('http')) return { type: 'embed', url: getEmbed(videoValue) }
  // Supabase path — gera signed URL
  const { data, error } = await db.storage.from('videos').createSignedUrl(videoValue, 7200)
  if (error || !data?.signedUrl) return null
  return { type: 'video', url: data.signedUrl }
}

// ── AUTH ──
let isAdmin = false
async function initAuth() {
  const { data: { session } } = await db.auth.getSession()
  if (!session) { window.location.replace('login.html'); return }
  currentUser = session.user
  // Verificação de admin feita no SERVIDOR (não pode ser manipulada)
  try {
    const meRes = await fetch('/api/me', {
      headers: { Authorization: `Bearer ${session.access_token}` }
    })
    const meData = await meRes.json()
    isAdmin = meData.isAdmin === true
  } catch (e) {
    isAdmin = false
  }

  const email = currentUser.email || ''
  const name = currentUser.user_metadata?.name || email
  document.getElementById('userEmail').textContent = email
  document.getElementById('userAvatar').textContent = (name[0] || '?').toUpperCase()
  document.getElementById('btnAdmin').style.display = isAdmin ? '' : 'none'
  document.getElementById('btnCourses').style.display = isAdmin ? '' : 'none'
  document.getElementById('btnStudentView').style.display = isAdmin ? '' : 'none'

  // Garante que admin-mode NUNCA apareça para alunas
  if (!isAdmin) {
    document.body.classList.remove('admin-mode')
    adminMode = false
    // Esconde qualquer botão admin que possa ter ficado visível
    document.querySelectorAll('[data-admin-only]').forEach(el => el.style.display = 'none')
  }

  await loadCourses()
}

// ── CURSOS ──
async function loadCourses() {
  let courses = []
  try {
    if (isAdmin) {
      const { data: d } = await db.from('courses').select('id, name, data').order('created_at')
      courses = d || []
    } else {
      // Usa API segura do servidor — não depende de RLS do Supabase
      const { data: { session } } = await db.auth.getSession()
      const res = await fetch('/api/student-courses', {
        headers: { Authorization: `Bearer ${session?.access_token}` }
      })
      if (res.ok) {
        const json = await res.json()
        courses = json.courses || []
      }
    }
  } catch (e) { console.error(e) }

  coursesCache = courses  // Salva em cache para uso em selectCourse sem precisar re-fetch

  document.getElementById('authGate').style.display = 'none'

  if (courses.length === 0) {
    if (isAdmin) {
      showCourseSelection([])
    } else {
      document.querySelector('main').innerHTML = `<div style="padding:80px 20px;text-align:center"><div style="font-size:2.5rem;margin-bottom:16px">🔒</div><h2 style="margin-bottom:8px">Sem acesso</h2><p style="color:var(--muted)">Você ainda não tem acesso a nenhum curso. Entre em contato com a administradora.</p></div>`
    }
    return
  }
  if (courses.length === 1) { await selectCourse(courses[0]); return }
  showCourseSelection(courses)
}

function showCourseSelection(courses) {
  document.querySelector('main').style.display = 'none'
  document.querySelector('aside').style.display = 'none'
  let p = document.getElementById('courseSelPage')
  if (!p) {
    p = document.createElement('div')
    p.id = 'courseSelPage'
    p.style.cssText = 'position:fixed;inset:0;top:56px;background:var(--bg);z-index:150;overflow-y:auto;padding:40px 24px'
    document.body.appendChild(p)
  }
  const siteUrl = location.origin
  const backBtn = currentCourseId ? `<button onclick="voltarCursoAtual()" style="margin-bottom:24px;padding:8px 16px;background:none;border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit;color:var(--muted)">← Voltar ao curso atual</button><br>` : ''
  const grid = courses.map(c => {
    const price = c.data?.price
    const fmtPrice = price ? `R$ ${Number(price).toLocaleString('pt-BR',{minimumFractionDigits:2})}` : 'Sem preço'
    const checkoutLink = `${siteUrl}/checkout.html?course=${c.id}`
    const adminControls = isAdmin ? `
      <div style="border-top:1px solid #D8D8C0;padding-top:10px;margin-top:8px;display:flex;flex-direction:column;gap:6px">
        <button data-id="${c.id}" data-name="${c.name.replace(/"/g,'&quot;')}" onclick="renameCourse(this.dataset.id,this.dataset.name)" style="padding:7px;background:#F5F5E8;border:1.5px solid #C8C8A0;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;color:#515132;text-align:left">✏️ Renomear curso</button>
        <button data-id="${c.id}" data-price="${price||0}" onclick="savePricePrompt(this.dataset.id,this.dataset.price)" style="padding:7px;background:#F5F5E8;border:1.5px solid #C8C8A0;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;color:#515132;text-align:left">💰 ${fmtPrice} — Alterar preço</button>
        <button onclick="navigator.clipboard.writeText('${checkoutLink}');toast('✅ Link copiado!')" style="padding:7px;background:#F5F5E8;border:1.5px solid #C8C8A0;border-radius:6px;font-size:.75rem;font-weight:600;cursor:pointer;font-family:inherit;color:#515132;text-align:left">🔗 Copiar link de checkout</button>
        <button onclick="goToStudentsPage('${c.id}')" style="padding:7px;background:#515132;border:none;border-radius:6px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;color:#fff;text-align:left">👩‍🎓 Gerenciar Alunas</button>
      </div>` : ''
    return `<div style="background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:8px">
      <div class="course-sel-card" data-cid="${c.id}" data-cname="${c.name.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}" style="cursor:pointer;transition:transform .12s">
        <div style="font-size:1.5rem;margin-bottom:6px">📚</div>
        <div style="font-weight:700;font-size:.95rem;margin-bottom:2px">${c.name}</div>
        <div style="font-size:.82rem;color:var(--muted)">${fmtPrice}</div>
      </div>
      ${adminControls}
    </div>`
  }).join('')
  p.innerHTML = `<div style="max-width:820px;margin:0 auto">${backBtn}<h1 style="font-size:1.3rem;font-weight:800;margin-bottom:6px">Seus cursos</h1><p style="color:var(--muted);margin-bottom:28px;font-size:.9rem">${isAdmin ? 'Clique no curso para editar • defina o preço • copie o link de checkout' : 'Selecione um curso para continuar'}</p><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px">${courses.length ? grid : '<p style="color:var(--muted)">Nenhum curso criado ainda.</p>'}</div>${isAdmin ? `<div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:24px"><button onclick="showCreateCourse()" style="padding:10px 22px;background:#515132;color:#fff;border:none;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit">+ Criar novo curso</button><button onclick="goToStudentsPage()" style="padding:10px 22px;background:#35351F;color:#fff;border:none;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit">👩‍🎓 Gerenciar Alunas</button></div>` : ''}</div>`

  // Usa event listener em vez de onclick inline para evitar quebra por aspas no nome do curso
  p.querySelectorAll('.course-sel-card').forEach(el => {
    el.addEventListener('click', () => selectCourse({ id: el.dataset.cid, name: el.dataset.cname }))
    el.addEventListener('mouseenter', () => { el.style.transform = 'translateY(-2px)'; el.style.opacity = '.85' })
    el.addEventListener('mouseleave', () => { el.style.transform = ''; el.style.opacity = '' })
  })
}

async function renameCourse(courseId, currentName) {
  const name = prompt('Novo nome do curso:', currentName)
  if (!name?.trim()) return
  const { data: { session } } = await db.auth.getSession()
  const res = await fetch('/api/courses', {
    method: 'PUT',
    headers: { Authorization: `Bearer ${session?.access_token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: courseId, name: name.trim() })
  })
  if (res.ok) {
    if (currentCourseId === courseId) document.getElementById('logo').textContent = name.trim()
    const { data: d } = await db.from('courses').select('id, name, data').order('created_at')
    showCourseSelection(d || [])
    toast('✅ Nome salvo!')
  } else toast('❌ Erro ao renomear.')
}

async function savePricePrompt(courseId, currentPrice) {
  const val = prompt('Preço do curso (apenas números, ex: 97):', currentPrice || '')
  const price = parseFloat(val)
  if (!price || price <= 0) return
  const { data: { session } } = await db.auth.getSession()
  // Usa o cache para não sobrescrever aulas/módulos já salvos
  const cached = coursesCache.find(c => c.id === courseId)
  const currentData = cached?.data || {}
  const res = await fetch('/api/courses', {
    method: 'PUT',
    headers: { Authorization: `Bearer ${session?.access_token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: courseId, data: { ...currentData, price } })
  })
  if (res.ok) {
    // Atualiza o cache com o novo preço
    if (cached) cached.data = { ...currentData, price }
    const { data: d } = await db.from('courses').select('id, name, data').order('created_at')
    coursesCache = d || []
    showCourseSelection(d || [])
    toast('✅ Preço salvo!')
  } else toast('❌ Erro ao salvar preço.')
}


function voltarCursoAtual() {
  document.getElementById('courseSelPage')?.remove()
  document.querySelector('main').style.display = ''
  document.querySelector('aside').style.display = ''
  render()
}

function goToStudentsPage(courseId) {
  // Define o curso pré-selecionado (vindo do card de um curso específico)
  studentsPreselectedCourse = courseId || null
  // Fecha a tela de seleção de cursos
  document.getElementById('courseSelPage')?.remove()
  // Restaura o layout principal
  document.querySelector('main').style.display = ''
  document.querySelector('aside').style.display = ''
  // Garante que o admin mode esteja ativo
  document.body.classList.add('admin-mode')
  isAdmin = true
  // Abre a página de alunas
  showStudentsPage()
}

async function selectCourse(course) {
  // Para alunas: verifica acesso via cache (já validado em loadCourses)
  // Para segurança extra, só bloqueia se o cache estiver populado e o curso não estiver nele
  if (!isAdmin && coursesCache.length > 0) {
    const cached = coursesCache.find(c => c.id === course.id)
    if (!cached) {
      toast('❌ Você não tem acesso a este curso.')
      return
    }
  }

  document.getElementById('courseSelPage')?.remove()
  currentCourseId = course.id
  currentCourseName = course.name || null
  document.getElementById('logo').textContent = course.name || window.SITE_NAME
  const scn = document.getElementById('sidebarCourseName'); if(scn) scn.textContent = course.name || ''
  document.querySelector('main').style.display = ''
  document.querySelector('aside').style.display = ''

  // 1) Primeiro tenta usar o cache (já tem os dados, sem re-fetch)
  const cached = coursesCache.find(c => c.id === course.id)
  if (cached?.data && (cached.data.lessons?.length || cached.data.modules?.length || cached.data.instructor?.name)) {
    data.instructor  = cached.data.instructor  || structuredClone(DEFAULTS.instructor)
    data.modules     = cached.data.modules     || []
    data.lessons     = cached.data.lessons     || []
    data.quickLinks  = cached.data.quickLinks  || []
    data.courseDesc  = cached.data.courseDesc  || ''
  } else {
    // 2) Fallback: busca diretamente no Supabase (funciona para admin com RLS aberta)
    const { data: d } = await db.from('courses').select('data').eq('id', currentCourseId).single()
    if (d?.data && (d.data.lessons?.length || d.data.modules?.length || d.data.instructor?.name)) {
      data.instructor  = d.data.instructor  || structuredClone(DEFAULTS.instructor)
      data.modules     = d.data.modules     || []
      data.lessons     = d.data.lessons     || []
      data.quickLinks  = d.data.quickLinks  || []
      data.courseDesc  = d.data.courseDesc  || ''
    } else if (isAdmin) {
      // Migrar dados do localStorage para o Supabase (primeira vez)
      const local = JSON.parse(localStorage.getItem('curso_data') || 'null')
      if (local) {
        data.instructor = local.instructor || structuredClone(DEFAULTS.instructor)
        data.modules    = local.modules    || []
        data.lessons    = local.lessons    || []
        await syncCourseToSupabase()
        localStorage.removeItem('curso_data')
        toast('✅ Dados migrados para a nuvem!')
      }
    }
  }

  // Carregar progresso do Supabase
  data.progress = {}
  const { data: progRows } = await db.from('user_progress')
    .select('lesson_id, completed, notes')
    .eq('user_id', currentUser.id)
    .eq('course_id', currentCourseId)
  if (progRows) progRows.forEach(r => {
    data.progress[r.lesson_id] = { completed: r.completed || false, notes: r.notes || '' }
  })

  render()
}

async function showCreateCourse() {
  const name = prompt('Nome do novo curso:')
  if (!name?.trim()) return
  const { data: { session } } = await db.auth.getSession()
  const res = await fetch('/api/courses', {
    method: 'POST',
    headers: { Authorization: `Bearer ${session?.access_token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name.trim() })
  })
  const json = await res.json()
  if (json.course) await selectCourse(json.course)
  else alert('Erro: ' + (json.erro || 'tente novamente'))
}

async function saveProgress(lessonId) {
  if (!currentCourseId || !lessonId || !currentUser) return
  const prog = data.progress[lessonId] || {}
  await db.from('user_progress').upsert({
    user_id: currentUser.id,
    course_id: currentCourseId,
    lesson_id: lessonId,
    completed: prog.completed || false,
    notes: prog.notes || '',
    updated_at: new Date().toISOString()
  }, { onConflict: 'user_id,course_id,lesson_id' })
}

function updateProgressBar() {
  const { pct } = getProgress()
  document.getElementById('progressBarFill').style.width = pct + '%'
  const fill = document.getElementById('sidebarProgressFill')
  const pctEl = document.getElementById('sidebarProgressPct')

// ── SIDEBAR ──
function renderModulesNav(search = '') {
  const nav = document.getElementById('modulesNav')
  nav.innerHTML = ''

  // Group lessons by module
  const groups = []
  data.modules.forEach(m => {
    const lessons = getModuleLessons(m.id).filter(l => !search || l.title.toLowerCase().includes(search))
    if (lessons.length || adminMode) groups.push({ module: m, lessons })
  })
  const unassigned = data.lessons.filter(l => !l.moduleId && (!search || l.title.toLowerCase().includes(search)))
  if (unassigned.length || (!data.modules.length)) groups.push({ module: null, lessons: unassigned })

  let globalIdx = 0
  groups.forEach(({ module, lessons }) => {
    const section = document.createElement('div')
    section.className = 'module-section'

    if (module) {
      const moduleLessons = getModuleLessons(module.id)
      const doneCnt = moduleLessons.filter(l => data.progress[l.id]?.completed).length
      section.innerHTML = `
        <div class="module-header">
          <span>${module.emoji || '📁'} ${module.title}</span>
          <span class="module-progress-text">${doneCnt}/${moduleLessons.length}</span>
        </div>`
    }

    const ul = document.createElement('ul')
    ul.className = 'lesson-list'

    lessons.forEach(l => {
      globalIdx++
      const done = data.progress[l.id]?.completed
      const li = document.createElement('li')
      li.innerHTML = `
        <button class="lesson-btn${currentLessonId === l.id ? ' active' : ''}${done ? ' done' : ''}" data-id="${l.id}">
          <span class="lesson-num">${done ? '✓' : globalIdx}</span>
          <span class="lesson-info">
            <span class="lesson-name">${l.title}</span>
            ${l.duration ? `<span class="lesson-meta">⏱ ${l.duration}</span>` : ''}
          </span>
          <span class="lesson-actions">
            <button class="icon-btn" data-edit="${l.id}" title="Editar">✏️</button>
            <button class="icon-btn danger" data-del="${l.id}" title="Excluir">🗑️</button>
          </span>
        </button>`
      ul.appendChild(li)
    })

    section.appendChild(ul)
    nav.appendChild(section)
  })

  // events
  nav.querySelectorAll('.lesson-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      if (e.target.closest('[data-edit],[data-del]')) return
      openLesson(btn.dataset.id); closeSidebar()
    })
  })
  nav.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', () => openLessonModal(b.dataset.edit)))
  nav.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', () => deleteLesson(b.dataset.del)))
}

    document.getElementById('courseDescEdit').style.display = 'none'
  })
  document.getElementById('btnSaveCourseDesc')?.addEventListener('click', () => {
    data.courseDesc = document.getElementById('courseDescInput').value.trim()
    const display = document.getElementById('courseDescDisplay')
    display.innerHTML = data.courseDesc || `<em>Nenhuma descrição ainda. Clique em ✏️ Editar para adicionar.</em>`
    display.style.display = ''
    document.getElementById('courseDescEdit').style.display = 'none'
    save(); toast('Apresentação salva!')
  })
  page.querySelectorAll('[data-lesson]').forEach(el => {
    el.addEventListener('click', () => openLesson(el.dataset.lesson))
  })

  // Quick Links (admin)
  document.getElementById('btnAddQuickLink')?.addEventListener('click', () => openQuickLinkModal())
  page.querySelectorAll('[data-editql]').forEach(el => {
    el.addEventListener('click', () => openQuickLinkModal(Number(el.dataset.editql)))
  })
  page.querySelectorAll('[data-delql]').forEach(el => {
    el.addEventListener('click', () => {
      const i = Number(el.dataset.delql)
      if (!confirm('Remover este card?')) return
      data.quickLinks.splice(i, 1)
      save(); renderOverview()
    })
  })
}

// ── DÚVIDAS DA ALUNA ──
async function loadStudentDoubts(lessonId, lessonTitle, containerId) {
  const container = document.getElementById(containerId)
  if (!container) return
  const { data: { session } } = await db.auth.getSession()
  const url = `/api/admin-data?action=doubts${currentCourseId ? '&courseId=' + currentCourseId : ''}`
  try {
    const r = await fetch(url, { headers: { Authorization: `Bearer ${session?.access_token}` } })
    const json = await r.json()
    if (json.needsSetup) { container.innerHTML = ''; return }
    const doubts = (json.doubts || []).filter(d => !lessonId || d.lesson_id === lessonId)
    if (!doubts.length) { container.innerHTML = `<div style="font-size:.82rem;color:var(--muted);font-style:italic">Nenhuma dúvida enviada ainda.</div>`; return }
    container.innerHTML = doubts.map(d => `
      <div style="background:var(--bg);border-radius:10px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--border)">
        <div style="font-size:.82rem;line-height:1.65;color:var(--text);margin-bottom:${d.answer ? '10px' : '0'}">💬 ${d.question}</div>
        ${d.answer ? `<div style="background:#F5F5E8;border-left:3px solid #515132;border-radius:0 8px 8px 0;padding:10px 14px;font-size:.82rem;line-height:1.65;color:#35351F">✏️ <strong>Resposta:</strong> ${d.answer}</div>` : '<div style="font-size:.75rem;color:var(--muted);margin-top:6px">⏳ Aguardando resposta...</div>'}
      </div>`).join('')
  } catch { container.innerHTML = '' }
}

        <div style="display:flex;flex-wrap:wrap;gap:5px;padding:8px;background:#F8F4EF;border-radius:8px;border:1px solid #E3DDD6">
          ${EMOJI_LIST.map(e => `<button type="button" data-emo="${e}" style="font-size:1.3rem;background:none;border:none;cursor:pointer;padding:2px 4px;border-radius:6px;line-height:1;transition:background .1s" title="${e}">${e}</button>`).join('')}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <label style="font-size:.75rem;font-weight:600;color:#7A6E65;text-transform:uppercase;letter-spacing:.04em">Título do card</label>
        <input id="qlTitle" value="${title}" placeholder="Ex: Guia Prático PDF" style="padding:9px 12px;border:1.5px solid #E3DDD6;border-radius:8px;font-size:.9rem;font-family:inherit;outline:none" />
      </div>
      <div style="display:flex;flex-direction:column;gap:4px">

      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button id="qlCancel" style="flex:1;padding:10px;border:1.5px solid #E3DDD6;background:#fff;border-radius:8px;font-size:.875rem;font-weight:600;cursor:pointer;font-family:inherit">Cancelar</button>
        <button id="qlSave"   style="flex:1;padding:10px;border:none;background:#515132;color:#fff;border-radius:8px;font-size:.875rem;font-weight:700;cursor:pointer;font-family:inherit">Salvar</button>
      </div>
    </div>`
  document.body.appendChild(modal)

  // Emoji picker buttons
  modal.querySelectorAll('[data-emo]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('qlIcon').value = btn.dataset.emo
      modal.querySelectorAll('[data-emo]').forEach(b => b.style.background = 'none')
      btn.style.background = '#E3DDD6'
    })
  })
  document.getElementById('qlCancel').addEventListener('click', () => modal.remove())
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove() })
  document.getElementById('qlSave').addEventListener('click', () => {
    const newQl = {
      id: ql?.id || uid(),
      icon:  document.getElementById('qlIcon').value.trim()  || '🔗',
      title: document.getElementById('qlTitle').value.trim() || 'Link',
      url:   document.getElementById('qlUrl').value.trim()   || '#'
    }
    if (!data.quickLinks) data.quickLinks = []
    if (idx !== undefined) data.quickLinks[idx] = newQl
    else data.quickLinks.push(newQl)
    modal.remove()
    save(); renderOverview()
  })
}

function openLesson(id) {
  const lessonCheck = data.lessons.find(l => l.id === id)
  if (lessonCheck?.locked && (!isAdmin || studentViewMode)) {
    toast('🔒 Esta aula ainda não está disponível.')
    return
  }
  currentLessonId = id
  activeTab = 'material'
  editingMat = false
  // progresso da última aula salvo no Supabase
  document.getElementById('btnOverview').classList.remove('active')
  document.getElementById('btnStudentsPage').classList.remove('active')
  document.getElementById('overviewPage').style.display = 'none'
  document.getElementById('studentsPage').style.display = 'none'
  renderModulesNav(document.getElementById('searchInput').value.toLowerCase())
  updateProgressBar()
  renderLessonPage()
  closeSidebar()
}

              <div class="link-url"><a href="${lk.url}" target="_blank" rel="noopener">${lk.url}</a></div>
            </div>
            ${adminMode ? `<button class="icon-btn danger" data-dellink="${lk.id}">✕</button>` : ''}
          </li>`).join('')}</ul>`
    tabContent = `${linksHtml}
      <div class="add-link-form">

          <div style="font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">📎 Enviar arquivo do computador</div>
          <label class="upload-btn-label" for="fileUploadInput">Escolher arquivo (PDF, imagem, doc...)</label>
          <input type="file" id="fileUploadInput" accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.jpg,.jpeg,.png,.gif,.mp4,.zip,.txt,.csv" hidden />
          <div class="upload-status" id="fileUploadStatus"></div>
        </div>
        <div class="divider-or" style="display:none" id="linkOrDivider">ou adicione um link</div>
        <div class="add-link-row">
          <input type="text" id="linkLabel" placeholder="Nome (ex: Apostila)" />
          <input type="url" id="linkUrl" placeholder="https://..." />
        </div>
        <div><button class="btn btn-dark" id="btnAddLink">+ Adicionar link manual</button></div>
      </div>`
  } else if (activeTab === 'notas') {
    tabContent = `
      <textarea class="notes-textarea" id="notesArea" placeholder="Escreva suas anotações sobre esta aula aqui...">${prog.notes || ''}</textarea>
      <div class="notes-hint">Suas anotações são salvas automaticamente.</div>
      <div class="notes-saved" id="notesSaved">✓ Anotações salvas</div>`
  }

  page.innerHTML = `
    <div class="lesson-header">
      <div>
        <h1>${lesson.title}</h1>
        ${lesson.desc ? `<p class="lesson-desc-text">${lesson.desc}</p>` : ''}
        ${lesson.duration ? `<p class="lesson-duration">⏱ ${lesson.duration}</p>` : ''}
      </div>
    </div>

    ${videoHtml}

    <div class="complete-bar">
      <button class="btn-complete${done ? ' done' : ''}" id="btnComplete">
        ${done ? '✅ Aula concluída' : '☐ Marcar como concluída'}
      </button>
      <div class="nav-btns">
        <button class="btn btn-outline" id="btnPrev" ${!prev ? 'disabled' : ''}>← Anterior</button>
        <button class="btn btn-dark" id="btnNext" ${!next ? 'disabled' : ''}>Próxima →</button>
      </div>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab-btn${activeTab === 'material' ? ' active' : ''}" data-tab="material">📄 Material</button>
        <button class="tab-btn${activeTab === 'links' ? ' active' : ''}" data-tab="links">🔗 Links ${links.length > 0 ? `(${links.length})` : ''}</button>
        <button class="tab-btn${activeTab === 'notas' ? ' active' : ''}" data-tab="notas">📝 Anotações</button>
      </div>
      <div class="card-body">${tabContent}</div>
    </div>

    <div class="lesson-nav">
      ${prev ? `<button class="nav-card" id="navPrev"><span class="nav-arrow">←</span><div><div class="nav-card-label">Anterior</div><div class="nav-card-title">${prev.title}</div></div></button>` : `<div></div>`}
      ${next ? `<button class="nav-card next" id="navNext"><span class="nav-arrow">→</span><div><div class="nav-card-label">Próxima</div><div class="nav-card-title">${next.title}</div></div></button>` : `<div></div>`}
    </div>
  `

  // EVENTS
  document.getElementById('btnComplete').addEventListener('click', () => {
    if (!data.progress[currentLessonId]) data.progress[currentLessonId] = {}
    data.progress[currentLessonId].completed = !data.progress[currentLessonId].completed
    data.progress[currentLessonId].completedAt = new Date().toISOString()
    save(); render(); saveProgress(currentLessonId)
    toast(data.progress[currentLessonId].completed ? '✅ Aula marcada como concluída!' : 'Aula desmarcada.')
  })
  document.getElementById('btnPrev')?.addEventListener('click', () => prev && openLesson(prev.id))
  document.getElementById('btnNext')?.addEventListener('click', () => next && openLesson(next.id))
  document.getElementById('navPrev')?.addEventListener('click', () => prev && openLesson(prev.id))
  document.getElementById('navNext')?.addEventListener('click', () => next && openLesson(next.id))

  page.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => { activeTab = btn.dataset.tab; renderLessonPage() })
  })
  document.getElementById('btnEditMat')?.addEventListener('click', () => { editingMat = true; renderLessonPage() })
  document.getElementById('btnCancelMat')?.addEventListener('click', () => { editingMat = false; renderLessonPage() })
  document.getElementById('btnSaveMat')?.addEventListener('click', () => {
    lesson.materials = document.getElementById('matEditor').innerHTML
    save(); editingMat = false; renderLessonPage(); toast('Material salvo!')
  })
  // Toolbar de formatação
  document.getElementById('tbUndo')?.addEventListener('mousedown', e => {
    e.preventDefault(); document.execCommand('undo'); document.getElementById('matEditor').focus()
  })
  document.getElementById('tbRedo')?.addEventListener('mousedown', e => {
    e.preventDefault(); document.execCommand('redo'); document.getElementById('matEditor').focus()
  })
  document.getElementById('tbBold')?.addEventListener('mousedown', e => {
    e.preventDefault(); document.execCommand('bold'); document.getElementById('matEditor').focus()
  })
  document.getElementById('tbItalic')?.addEventListener('mousedown', e => {
    e.preventDefault(); document.execCommand('italic'); document.getElementById('matEditor').focus()
  })

  // Heading / estilo do texto
  document.getElementById('tbHeading')?.addEventListener('mousedown', e => { e.stopPropagation() })
  document.getElementById('tbHeading')?.addEventListener('change', e => {
    const editor = document.getElementById('matEditor')
    const val = e.target.value
    if (!val) {
      document.execCommand('formatBlock', false, 'p')
    } else {
      document.execCommand('formatBlock', false, val)
    }
    editor.focus()
    e.target.value = ''
  })

  // Fechar todas as paletas ao clicar fora
  document.addEventListener('mousedown', e => {
    if (!document.getElementById('colorWrap')?.contains(e.target))
      document.getElementById('colorPalette')?.classList.add('hidden')
    if (!document.getElementById('bgColorWrap')?.contains(e.target))
      document.getElementById('bgColorPalette')?.classList.add('hidden')
  }, { capture: true })

  // Cor do texto — abrir/fechar paleta
  document.getElementById('tbColorBtn')?.addEventListener('mousedown', e => {
    e.preventDefault()
    document.getElementById('bgColorPalette')?.classList.add('hidden')
    document.getElementById('colorPalette').classList.toggle('hidden')
  })
  document.getElementById('colorPalette')?.querySelectorAll('.mat-color-swatch').forEach(sw => {
    sw.addEventListener('mousedown', e => {
      e.preventDefault()
      const color = sw.dataset.color
      document.execCommand('foreColor', false, color)
      document.getElementById('colorIndicator').style.background = color
      document.getElementById('colorPalette').classList.add('hidden')
      document.getElementById('matEditor').focus()
    })
  })

  // Cor de fundo — abrir/fechar paleta
  document.getElementById('tbBgColorBtn')?.addEventListener('mousedown', e => {
    e.preventDefault()
    document.getElementById('colorPalette')?.classList.add('hidden')
    document.getElementById('bgColorPalette').classList.toggle('hidden')
  })
  document.getElementById('bgColorPalette')?.querySelectorAll('.mat-bg-swatch').forEach(sw => {
    sw.addEventListener('mousedown', e => {
      e.preventDefault()
      const bg = sw.dataset.bg
      const editor = document.getElementById('matEditor')
      editor.focus()
      const sel = window.getSelection()
      if (!sel || sel.rangeCount === 0) { document.getElementById('bgColorPalette').classList.add('hidden'); return }
      const range = sel.getRangeAt(0)
      // Pega o HTML selecionado
      const tmp = document.createElement('div')
      tmp.appendChild(range.cloneContents())
      const selectedHTML = tmp.innerHTML || sel.toString()
      if (!selectedHTML) { document.getElementById('bgColorPalette').classList.add('hidden'); return }
      if (bg === 'transparent') {
        // Remove fundo: insere o conteúdo sem background (rastreado no desfazer)
        const clean = selectedHTML.replace(/background(-color)?:[^;"]+(;)?/gi, '')
        document.execCommand('insertHTML', false, clean)
        document.getElementById('bgColorIndicator').style.background = '#FFFF00'
      } else {
        // Aplica cor de fundo via insertHTML — entra no histórico de desfazer
        document.execCommand('insertHTML', false, `<span style="background-color:${bg}">${selectedHTML}</span>`)
        document.getElementById('bgColorIndicator').style.background = bg
      }
      document.getElementById('bgColorPalette').classList.add('hidden')
      editor.focus()
    })
  })

  // Enter: remove cor de fundo da nova linha automaticamente
  document.getElementById('matEditor')?.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return
    // Deixa o navegador criar a linha normalmente, depois limpa o fundo herdado
    setTimeout(() => {
      const editor = document.getElementById('matEditor')
      const sel = window.getSelection()
      if (!sel || sel.rangeCount === 0) return
      // Sobe a partir do cursor procurando qualquer elemento com background-color
      let node = sel.anchorNode
      if (node && node.nodeType === 3) node = node.parentNode
      while (node && node !== editor) {
        if (node.nodeType === 1 && node.style && node.style.backgroundColor && node.style.backgroundColor !== '') {
          node.style.backgroundColor = ''
          node.style.background = ''
          // Se o span ficou sem nenhum estilo, remove a tag mantendo o conteúdo
          if (node.tagName === 'SPAN') {
            const attr = node.getAttribute('style')
            if (!attr || !attr.trim()) {
              const parent = node.parentNode
              if (parent) {
                while (node.firstChild) parent.insertBefore(node.firstChild, node)
                parent.removeChild(node)
              }
            }
          }
          break
        }
        node = node.parentNode
      }
    }, 0)
  })

  // Maiúsculas / minúsculas
  document.getElementById('tbUppercase')?.addEventListener('mousedown', e => {
    e.preventDefault()
    const editor = document.getElementById('matEditor')
    const sel = window.getSelection()
    if (sel && sel.rangeCount > 0 && !sel.isCollapsed) {
      const range = sel.getRangeAt(0)
      const text = range.toString()
      document.execCommand('insertText', false, text.toUpperCase())
    }
    editor.focus()
  })
  document.getElementById('tbLowercase')?.addEventListener('mousedown', e => {
    e.preventDefault()
    const editor = document.getElementById('matEditor')
    const sel = window.getSelection()
    if (sel && sel.rangeCount > 0 && !sel.isCollapsed) {
      const range = sel.getRangeAt(0)
      const text = range.toString()
      document.execCommand('insertText', false, text.toLowerCase())
    }
    editor.focus()
  })

  document.getElementById('tbCallout')?.addEventListener('mousedown', e => {
    e.preventDefault()
    const editor = document.getElementById('matEditor')
    const sel = window.getSelection()
    const callout = document.createElement('div')
    callout.className = 'callout'
    if (sel && sel.rangeCount > 0 && !sel.isCollapsed) {
      // Envolve a seleção na caixa de destaque
      try {
        const range = sel.getRangeAt(0)
        const fragment = range.extractContents()
        callout.appendChild(fragment)
        range.insertNode(callout)
        // Posiciona cursor após o callout
        const after = document.createRange()
        after.setStartAfter(callout); after.collapse(true)
        sel.removeAllRanges(); sel.addRange(after)
      } catch(err) { editor.appendChild(callout) }
    } else {
      // Insere caixa vazia na posição do cursor
      callout.innerHTML = '<br>'
      if (sel && sel.rangeCount > 0) {
        const range = sel.getRangeAt(0)
        range.insertNode(callout)
        const inside = document.createRange()
        inside.setStart(callout, 0); inside.collapse(true)
        sel.removeAllRanges(); sel.addRange(inside)
      } else { editor.appendChild(callout) }
    }
    editor.focus()
  })
  document.getElementById('btnAddLink')?.addEventListener('click', () => {
    const label = document.getElementById('linkLabel').value.trim()
    const url   = document.getElementById('linkUrl').value.trim()
    if (!url) { toast('Informe a URL do link.'); return }
    if (!lesson.links) lesson.links = []
    lesson.links.push({ id: uid(), label, url })
    save(); renderLessonPage(); toast('Link adicionado!')
  })
  page.querySelectorAll('[data-dellink]').forEach(b => {
    b.addEventListener('click', () => {
      lesson.links = (lesson.links || []).filter(l => l.id !== b.dataset.dellink)
      save(); renderLessonPage()
    })
  })
  // Mostrar divisor "ou" no modo admin
  if (adminMode) document.getElementById('linkOrDivider')?.style.setProperty('display','flex')
  // Upload de arquivo na aula
  document.getElementById('fileUploadInput')?.addEventListener('change', async (e) => {
    const file = e.target.files[0]
    if (!file) return
    const statusEl = document.getElementById('fileUploadStatus')
    statusEl.textContent = `Enviando ${file.name}...`
    statusEl.className = 'upload-status'
    try {
      const safeName = file.name.replace(/\s+/g, '_').replace(/[^\w.-]/g, '')
      const path = `lessons/${currentLessonId}/${Date.now()}_${safeName}`
      const url = await uploadFile(file, path)
      if (!lesson.links) lesson.links = []
      lesson.links.push({ id: uid(), label: file.name, url })
      save(); renderLessonPage(); toast('✅ Arquivo enviado!')
    } catch (err) {
      statusEl.textContent = '❌ Erro ao enviar. Tente novamente.'
      statusEl.className = 'upload-status err'
    }
  })
  // Notes auto-save
  const notesEl = document.getElementById('notesArea')
  if (notesEl) {
    notesEl.addEventListener('input', () => {
      clearTimeout(notesSaveTimer)
      notesSaveTimer = setTimeout(() => {
        if (!data.progress[currentLessonId]) data.progress[currentLessonId] = {}
        data.progress[currentLessonId].notes = notesEl.value
        save(); saveProgress(currentLessonId)
        const el = document.getElementById('notesSaved')
        if (el) { el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 1500) }
      }, 600)
    })
  }
}

  document.getElementById('btnStudentsPage').classList.remove('active')

async function showStudentsPage() {

  document.getElementById('btnStudentsPage').classList.add('active')

  const { data: { session } } = await db.auth.getSession()
  const token = session?.access_token

  // Buscar alunas, cursos e acessos em paralelo
  let students = [], allCourses = [], allAccess = []
  try {
    const [sRes, cRes, aRes] = await Promise.all([
      fetch('/api/students', { headers: { Authorization: `Bearer ${token}` } }),
      fetch('/api/courses', { headers: { Authorization: `Bearer ${token}` } }),
      fetch('/api/courses?action=access', { headers: { Authorization: `Bearer ${token}` } })
    ])
    students = (await sRes.json()).students || []
    allCourses = (await cRes.json()).courses || []
    allAccess = (await aRes.json()).access || []
  } catch {}

  const formatDate = d => d ? new Date(d).toLocaleDateString('pt-BR') : '—'

          <div class="upload-status" id="bulkStatus"></div>
        </div>
      </div>
    </div>

    <div class="students-table-wrap">
      <table class="students-table">
        <thead><tr>
          <th>Aluna</th><th>Cadastrada em</th><th>Último acesso</th><th>Cursos</th><th></th>
        </tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>`

  // Pré-seleciona o curso correto no formulário de adicionar aluna
  if (studentsPreselectedCourse) {
    const cb = document.querySelector(`input[name="courseAccess"][value="${studentsPreselectedCourse}"]`)
    if (cb) {
      cb.checked = true
      const lbl = document.getElementById(`label_${studentsPreselectedCourse}`)
      if (lbl) { lbl.style.borderColor = '#1C1917'; lbl.style.background = '#F5F5F4' }
    }
  }

  document.getElementById('btnAddStudent').addEventListener('click', () => addStudent(token))
  document.getElementById('newStudentEmail').addEventListener('keydown', e => { if (e.key === 'Enter') addStudent(token) })
  document.getElementById('btnBulkAdd').addEventListener('click', () => bulkAddStudents(token))
  page.querySelectorAll('[data-delstudent]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm(`Remover ${btn.dataset.email}?`)) return
      const res = await fetch('/api/students', {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: btn.dataset.delstudent })
      })
      if (res.ok) { toast('Aluna removida.'); showStudentsPage() }
      else toast('Erro ao remover.')
    })
  })
}

async function showProgressTab() {
  currentLessonId = null
  document.getElementById('lessonPage').style.display = 'none'
  document.getElementById('overviewPage').style.display = 'none'
  document.getElementById('btnOverview').classList.remove('active')
  document.getElementById('btnStudentsPage').classList.add('active')
  const page = document.getElementById('studentsPage')
  page.style.display = 'flex'
  closeSidebar()

  if (!currentCourseId) {
    page.innerHTML = `<div style="padding:40px;color:var(--muted);text-align:center">Selecione um curso primeiro para ver o progresso das alunas.</div>`
    return
  }

  page.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">Carregando progresso...</div>`

  const { data: { session } } = await db.auth.getSession()
  const token = session?.access_token

  const tabsHtml = `
    <div style="display:flex;gap:6px;margin-bottom:24px;border-bottom:2px solid var(--border);padding-bottom:0">
      <button onclick="showStudentsPage()" style="padding:10px 18px;border:none;background:none;font-family:inherit;font-size:.85rem;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px">👩‍🎓 Alunas</button>
      <button style="padding:10px 18px;border:none;background:none;font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer;color:#515132;border-bottom:2px solid #515132;margin-bottom:-2px">📊 Progresso</button>
      <button onclick="showDoubtsTab()" style="padding:10px 18px;border:none;background:none;font-family:inherit;font-size:.85rem;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px">💬 Dúvidas</button>
    </div>`

  let students = [], progress = []
  try {
    const r = await fetch(`/api/admin-data?action=progress&courseId=${currentCourseId}`, { headers: { Authorization: `Bearer ${token}` } })
    const json = await r.json()
    students = json.students || []
    progress = json.progress || []
  } catch { page.innerHTML = tabsHtml + `<div style="padding:40px;color:var(--muted);text-align:center">Erro ao carregar progresso.</div>`; return }

  // Monta mapa: userId -> Set de lessons completadas
  const completedMap = {}
  progress.forEach(p => {
    if (!completedMap[p.user_id]) completedMap[p.user_id] = new Set()
    if (p.completed) completedMap[p.user_id].add(p.lesson_id)
  })

  const totalLessons = data.lessons.length
  const rows = students.map(s => {
    const done = completedMap[s.id]?.size || 0
    const pct  = totalLessons ? Math.round(done / totalLessons * 100) : 0
    const barColor = pct >= 100 ? '#22C55E' : pct > 50 ? '#515132' : '#C8C8A0'
    return `<tr>
      <td>
        <div style="font-weight:600;font-size:.88rem">${s.name || '—'}</div>
        <div style="font-size:.75rem;color:var(--muted)">${s.email}</div>
      </td>
      <td style="min-width:160px">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="flex:1;height:8px;background:var(--border);border-radius:99px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:${barColor};border-radius:99px;transition:width .4s"></div>
          </div>
          <div style="font-size:.8rem;font-weight:700;color:${barColor};min-width:36px">${pct}%</div>
        </div>
        <div style="font-size:.7rem;color:var(--muted);margin-top:3px">${done} de ${totalLessons} aula${totalLessons !== 1 ? 's' : ''} concluída${done !== 1 ? 's' : ''}</div>
      </td>
      <td style="text-align:center">
        ${pct >= 100 ? '<span style="color:#22C55E;font-weight:700;font-size:.82rem">✓ Concluído</span>' : pct > 0 ? '<span style="color:#515132;font-size:.82rem">Em andamento</span>' : '<span style="color:var(--muted);font-size:.82rem">Não iniciou</span>'}
      </td>
    </tr>`
  }).join('')

  page.innerHTML = tabsHtml + `
    <div class="students-header">
      <h1>📊 Progresso das Alunas</h1>
      <span style="font-size:.85rem;color:var(--muted)">${students.length} aluna${students.length !== 1 ? 's' : ''} · ${data.lessons.length} aula${data.lessons.length !== 1 ? 's' : ''}</span>
    </div>
    <div class="students-table-wrap">
      <table class="students-table">
        <thead><tr><th>Aluna</th><th>Progresso</th><th>Status</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="3" class="students-empty">Nenhuma aluna cadastrada.</td></tr>'}</tbody>
      </table>
    </div>`
}
