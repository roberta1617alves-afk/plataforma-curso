async function toggleAccess(userId, courseId, hasAccess, token) {
  const method = hasAccess ? 'DELETE' : 'POST'
  await fetch('/api/courses?action=access', {
    method,
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId, courseId })
  })
  toast(hasAccess ? 'Acesso removido.' : '✅ Acesso concedido!')
  showStudentsPage()
}

async function addStudent(token) {
  const email = document.getElementById('newStudentEmail').value.trim()
  const name  = document.getElementById('newStudentName').value.trim()
  const phone = document.getElementById('newStudentPhone').value.trim()
  const status = document.getElementById('addStudentStatus')

  // Cursos selecionados — pega ID e nome de cada checkbox marcado
  const selectedCourses = [...document.querySelectorAll('input[name="courseAccess"]:checked')]
    .map(el => ({ id: el.value, name: el.closest('label')?.querySelector('span')?.textContent?.trim() || el.value }))

  if (!email) { status.textContent = 'Informe o e-mail.'; status.className = 'upload-status err'; return }
  status.textContent = 'Adicionando...'; status.className = 'upload-status'

  // Envia nomes dos cursos junto para a mensagem de boas-vindas usar o nome correto
  const courseNames = selectedCourses.map(c => c.name)

  const res = await fetch('/api/students', {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, name, phone, courseNames })
  })
  const json = await res.json()

  if (res.ok) {
    const userId = json.student?.id

    // Concede acesso aos cursos selecionados (funciona tanto para alunas novas quanto existentes)
    if (userId && selectedCourses.length > 0) {
      status.textContent = 'Liberando acesso aos cursos...'
      await Promise.all(selectedCourses.map(c =>
        fetch('/api/courses?action=access', {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, courseId: c.id })
        })
      ))
    }

    const cursosMsg = selectedCourses.length > 0
      ? ` | 📚 Acesso: ${selectedCourses.map(c => c.name).join(', ')}`
      : ''

    if (json.alreadyExists) {
      // Aluna já existia — apenas liberou acesso aos cursos selecionados
      status.textContent = `✓ Aluna já cadastrada. Acesso liberado!${cursosMsg}`
    } else {
      const waMsg = !phone              ? ''
                  : json.waStatus === 'enviado'   ? ' | ✅ WhatsApp enviado'
                  : json.waStatus === 'sem_chave' ? ' | ⚠️ WA: credenciais não configuradas'
                  : ` | ❌ WA: ${json.waStatus}`
      status.textContent = `✓ ${email} adicionada!${cursosMsg}${waMsg}`
    }
    status.className = 'upload-status ok'
    setTimeout(() => showStudentsPage(), 4000)
  } else {
    status.textContent = json.erro || 'Erro ao adicionar.'
    status.className = 'upload-status err'
  }
}

async function bulkAddStudents(token) {
  const lines = document.getElementById('bulkEmails').value.split('\n').map(l => l.trim()).filter(Boolean)
  if (!lines.length) return
  const status = document.getElementById('bulkStatus')
  status.textContent = `Adicionando ${lines.length} alunas...`; status.className = 'upload-status'
  let ok = 0, fail = 0
  for (const email of lines) {
    const res = await fetch('/api/students', {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    })
    res.ok ? ok++ : fail++
  }
  status.textContent = `✓ ${ok} adicionada${ok !== 1 ? 's' : ''}${fail ? ` · ${fail} erro(s)` : ''}.`
  status.className = 'upload-status ok'
  setTimeout(() => showStudentsPage(), 1500)
}

function openLessonModal(editId = null) {

  document.getElementById('lessonModalTitle').textContent = l ? 'Editar aula' : 'Nova aula'

  document.getElementById('fDesc').value     = l?.desc     || ''
  // populate modules
  const sel = document.getElementById('fModule')
  sel.innerHTML = '<option value="">— Sem módulo —</option>'
  data.modules.forEach(m => {
    const opt = document.createElement('option')

    sel.appendChild(opt)

}

document.getElementById('saveLessonBtn').addEventListener('click', () => {

  const duration = document.getElementById('fDuration').value.trim()
  const desc     = document.getElementById('fDesc').value.trim()
  const moduleId = document.getElementById('fModule').value || null
  if (editingLessonId) {
    const l = data.lessons.find(x => x.id === editingLessonId)
    Object.assign(l, { title, video, duration, desc, moduleId })
  } else {
    data.lessons.push({ id: uid(), title, video, duration, desc, moduleId, materials: '', links: [] })
  }
  save(); closeModal('modalLesson'); render()
  toast(editingLessonId ? 'Aula atualizada!' : 'Aula criada!')
})

function deleteLesson(id) {

  if (currentLessonId === id) currentLessonId = null
  save(); render()
  toast('Aula excluída.')
}

  const fillEl = document.getElementById('videoProgressFill')

  if (file.size > 5 * 1024 * 1024 * 1024) {
    statusEl.textContent = '❌ Arquivo muito grande (máx 5 GB).'; statusEl.className = 'upload-status err'; return
  }

  statusEl.textContent = 'Enviando vídeo... (pode levar alguns minutos)'; statusEl.className = 'upload-status'
  progressEl.style.display = 'block'

  try {
    const safeName = file.name.replace(/\s+/g, '_').replace(/[^\w.-]/g, '')
    const path = `aulas/${Date.now()}_${safeName}`
    const { data: { session } } = await db.auth.getSession()
    const accessToken = session?.access_token

    // Obtém URL assinada para upload direto ao Supabase Storage
    const tokenRes = await fetch('/api/upload-token', {
      method: 'POST',
      headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ bucket: 'videos', path })
    })
    if (!tokenRes.ok) {
      const errData = await tokenRes.json().catch(() => ({}))
      throw new Error(errData.erro || 'Erro ao obter permissão de upload. Verifique se o bucket "videos" existe no Supabase.')
    }
    const { signedUrl } = await tokenRes.json()

    // Upload via XHR para ter barra de progresso real
    await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest()
      xhr.open('PUT', signedUrl)
      xhr.setRequestHeader('Content-Type', file.type)
      xhr.upload.addEventListener('progress', (ev) => {
        if (ev.lengthComputable) {
          fillEl.style.width = Math.round((ev.loaded / ev.total) * 100) + '%'
        }
      })
      xhr.addEventListener('load', () => {
        if (xhr.status >= 200 && xhr.status < 300) resolve()
        else reject(new Error(`Upload falhou (HTTP ${xhr.status}). Verifique o bucket "videos" no Supabase.`))
      })
      xhr.addEventListener('error', () => reject(new Error('Erro de rede durante upload do vídeo.')))
      xhr.send(file)
    })

    fillEl.style.width = '100%'
    document.getElementById('fVideo').value = path   // guarda o path, não URL
    statusEl.textContent = '✅ Vídeo enviado! Clique em Salvar.'
    statusEl.className = 'upload-status ok'
  } catch (err) {
    progressEl.style.display = 'none'
    statusEl.textContent = '❌ ' + (err.message || 'Erro ao enviar. Tente novamente.')
    statusEl.className = 'upload-status err'
  }
})

// ── MODALS ──
function closeModal(id) {
  document.getElementById(id).classList.remove('open')
  editingLessonId = null; editingModuleId = null
}
document.querySelectorAll('[data-close]').forEach(btn => {
  btn.addEventListener('click', () => closeModal(btn.dataset.close))
})
document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) closeModal(el.id) })
})

// ── MOBILE SIDEBAR ──
document.getElementById('btnMenu').addEventListener('click', () => {
  if (window.innerWidth >= 769) {
    // Desktop: vai para visão geral (home) com lista de todas as aulas
    showOverview()
  } else {
    // Mobile: abre/fecha sidebar com lista de aulas
    const aside = document.getElementById('sidebar')
    if (aside.style.display === 'none') aside.style.display = ''
    aside.classList.toggle('open')
    document.getElementById('backdrop').classList.toggle('open')
  }
})
document.getElementById('backdrop').addEventListener('click', closeSidebar)
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open')
  document.getElementById('backdrop').classList.remove('open')
}

// ── INIT ──
initAuth()
</script>
