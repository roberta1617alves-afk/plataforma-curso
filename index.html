<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLAUDE IA PARA MENTORAS</title>
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FAFAF9; --surface: #fff; --border: #E7E5E4;
      --text: #1C1917; --muted: #78716C; --light: #F5F5F4;
      --accent: #1C1917; --accent-h: #292524;
      --green: #16A34A; --green-bg: #F0FDF4; --green-border: #BBF7D0;
      --danger: #DC2626;
      --sidebar-w: 280px; --header-h: 56px; --radius: 8px;
    }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; }

    /* AUTH GATE */
    #authGate { position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999; }
    .spinner { width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* HEADER */
    header { position:fixed;top:0;left:0;right:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border); }
    .header-main { height:var(--header-h);display:flex;align-items:center;padding:0 16px;gap:10px; }
    .btn-menu { display:none;background:none;border:none;cursor:pointer;padding:6px;border-radius:6px;color:var(--muted); }
    .btn-menu:hover { background:var(--light); }
    .btn-menu svg { width:20px;height:20px;display:block; }
    .logo { font-size:.95rem;font-weight:800;letter-spacing:-.02em;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .header-right { display:flex;align-items:center;gap:8px; }
    .user-chip { display:flex;align-items:center;gap:7px;padding:4px 10px 4px 5px;border-radius:99px;border:1px solid var(--border); }
    .avatar { width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;flex-shrink:0; }
    .user-email { font-size:.78rem;color:var(--muted); }
    .btn-sm { padding:6px 12px;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:inherit;transition:all .12s; }
    .btn-sm:hover { background:var(--light);color:var(--text); }
    .btn-sm.active { background:var(--accent);color:#fff;border-color:var(--accent); }

    /* PROGRESS BAR */
    .progress-bar-wrap { height:3px;background:var(--border); }
    .progress-bar-fill { height:100%;background:var(--green);transition:width .4s ease; }

    /* LAYOUT */
    .layout { display:flex;padding-top:calc(var(--header-h) + 3px);min-height:100dvh; }

    /* SIDEBAR */
    aside { width:var(--sidebar-w);position:fixed;top:calc(var(--header-h)+3px);left:0;bottom:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;z-index:90;transition:transform .22s ease;display:flex;flex-direction:column; }
    .sidebar-search { padding:12px 12px 8px; }
    .search-input { width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:.82rem;font-family:inherit;outline:none;background:var(--bg);color:var(--text);transition:border .15s; }
    .search-input:focus { border-color:var(--accent);background:var(--surface); }
    .search-input::placeholder { color:#A8A29E; }

    .sidebar-overview-btn { margin:0 12px 10px;padding:9px 12px;background:var(--light);border:1.5px solid var(--border);border-radius:var(--radius);font-size:.82rem;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .12s;text-align:left; }
    .sidebar-overview-btn:hover,.sidebar-overview-btn.active { background:var(--accent);color:#fff;border-color:var(--accent); }

    .module-section { margin-bottom:4px; }
    .module-header { padding:8px 14px 4px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);display:flex;align-items:center;justify-content:space-between; }
    .module-progress-text { font-size:.68rem;color:var(--muted);font-weight:400;letter-spacing:0; }
    .lesson-list { list-style:none;padding:0 8px; }
    .lesson-btn { width:100%;background:none;border:none;text-align:left;padding:8px 10px;cursor:pointer;border-radius:6px;display:flex;align-items:flex-start;gap:8px;transition:background .1s;font-family:inherit; }
    .lesson-btn:hover { background:var(--light); }
    .lesson-btn.active { background:var(--light); }
    .lesson-num { min-width:22px;height:22px;margin-top:1px;border-radius:4px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:var(--muted);flex-shrink:0;transition:all .15s; }
    .lesson-btn.active .lesson-num { background:var(--accent);color:#fff; }
    .lesson-btn.done .lesson-num { background:var(--green);color:#fff; }
    .lesson-info { flex:1;min-width:0; }
    .lesson-name { font-size:.85rem;font-weight:500;color:var(--text);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .lesson-meta { font-size:.72rem;color:var(--muted);margin-top:2px; }
    .lesson-actions { display:none;gap:2px; }
    .admin-mode .lesson-actions { display:flex; }
    .icon-btn { background:none;border:none;cursor:pointer;padding:3px 5px;border-radius:5px;font-size:.8rem;color:var(--muted);line-height:1;transition:all .1s; }
    .icon-btn:hover { background:var(--border);color:var(--text); }
    .icon-btn.danger:hover { color:var(--danger); }
    .sidebar-footer { padding:8px 12px 16px;margin-top:auto; }
    .btn-new-lesson { display:none;width:100%;padding:8px 12px;background:none;color:var(--muted);border:1.5px dashed var(--border);border-radius:6px;font-size:.82rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .12s;margin-bottom:6px; }
    .btn-new-lesson:hover { border-color:var(--accent);color:var(--accent);background:var(--light); }
    .btn-new-module { display:none;width:100%;padding:8px 12px;background:none;color:var(--muted);border:1.5px dashed var(--border);border-radius:6px;font-size:.82rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .12s; }
    .btn-new-module:hover { border-color:var(--accent);color:var(--accent);background:var(--light); }
    .admin-mode .btn-new-lesson,.admin-mode .btn-new-module { display:block; }

    /* MAIN */
    main { margin-left:var(--sidebar-w);flex:1;padding:32px 28px;max-width:calc(var(--sidebar-w) + 860px); }

    /* ── OVERVIEW PAGE ── */
    .overview { display:flex;flex-direction:column;gap:24px; }

    /* Banner */
    .banner { background:var(--accent);border-radius:16px;padding:36px;display:flex;align-items:center;gap:32px;overflow:hidden;position:relative; }
    .banner::before { content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");z-index:0; }
    .banner-content { flex:1;z-index:1;min-width:0; }
    .banner-tag { font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.6);margin-bottom:8px; }
    .banner-title { font-size:1.7rem;font-weight:900;color:#fff;letter-spacing:-.03em;line-height:1.15;margin-bottom:10px; }
    .banner-instructor { font-size:.9rem;color:rgba(255,255,255,.75);margin-bottom:20px; }
    .banner-stats { display:flex;gap:20px;flex-wrap:wrap; }
    .banner-stat { text-align:center; }
    .banner-stat-val { font-size:1.4rem;font-weight:800;color:#fff;line-height:1; }
    .banner-stat-label { font-size:.7rem;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.06em;margin-top:2px; }
    .banner-photo { width:120px;height:120px;border-radius:50%;border:4px solid rgba(255,255,255,.2);object-fit:cover;flex-shrink:0;z-index:1;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;overflow:hidden; }
    .banner-photo img { width:100%;height:100%;object-fit:cover; }
    .banner-photo-placeholder { font-size:2.5rem;color:rgba(255,255,255,.4); }
    .btn-continue { display:inline-flex;align-items:center;gap:8px;background:#fff;color:var(--accent);padding:11px 22px;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .15s; }
    .btn-continue:hover { background:rgba(255,255,255,.9); }

    /* Stats cards */
    .stats-row { display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px; }
    .stat-card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px; }
    .stat-card-val { font-size:1.6rem;font-weight:800;color:var(--text);letter-spacing:-.03em; }
    .stat-card-label { font-size:.78rem;color:var(--muted);margin-top:4px; }
    .stat-card.green { border-color:var(--green-border);background:var(--green-bg); }
    .stat-card.green .stat-card-val { color:var(--green); }

    /* Progress overview */
    .progress-section { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px; }
    .progress-section h3 { font-size:.9rem;font-weight:700;margin-bottom:14px; }
    .progress-track { background:var(--border);border-radius:99px;height:8px;overflow:hidden;margin-bottom:8px; }
    .progress-track-fill { height:100%;background:var(--green);border-radius:99px;transition:width .4s ease; }
    .progress-label { font-size:.8rem;color:var(--muted); }

    /* Instructor card */
    .instructor-card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;display:flex;align-items:center;gap:16px; }
    .instructor-avatar { width:56px;height:56px;border-radius:50%;background:var(--light);flex-shrink:0;object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:var(--muted);overflow:hidden; }
    .instructor-avatar img { width:100%;height:100%;object-fit:cover; }
    .instructor-name { font-size:1rem;font-weight:700; }
    .instructor-title { font-size:.8rem;color:var(--muted);margin-top:2px; }
    .instructor-bio { font-size:.85rem;color:var(--muted);margin-top:8px;line-height:1.6; }
    .btn-edit-instructor { display:none;margin-left:auto;flex-shrink:0; }
    .admin-mode .btn-edit-instructor { display:block; }

    /* Modules overview */
    .modules-overview h3 { font-size:.9rem;font-weight:700;margin-bottom:12px; }
    .module-cards { display:flex;flex-direction:column;gap:8px; }
    .module-card { background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .12s; }
    .module-card:hover { border-color:var(--accent);background:var(--light); }
    .module-card-icon { width:36px;height:36px;border-radius:8px;background:var(--light);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0; }
    .module-card-info { flex:1;min-width:0; }
    .module-card-title { font-size:.875rem;font-weight:600; }
    .module-card-meta { font-size:.75rem;color:var(--muted);margin-top:2px; }
    .module-card-progress { font-size:.75rem;font-weight:700;color:var(--green); }

    /* Completion */
    .completion-banner { background:var(--green-bg);border:1.5px solid var(--green-border);border-radius:12px;padding:24px;text-align:center;display:none; }
    .completion-banner.show { display:block; }
    .completion-banner h3 { font-size:1.1rem;font-weight:800;color:var(--green);margin-bottom:6px; }
    .completion-banner p { font-size:.875rem;color:#166534; }

    /* ── LESSON VIEW ── */
    .lesson-view { display:flex;flex-direction:column;gap:20px; }
    .lesson-header { display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap; }
    .lesson-header h1 { font-size:1.4rem;font-weight:800;letter-spacing:-.02em;line-height:1.25; }
    .lesson-desc-text { font-size:.875rem;color:var(--muted);margin-top:5px; }
    .lesson-duration { font-size:.75rem;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:4px; }

    /* Video */
    .video-wrap { border-radius:10px;overflow:hidden;aspect-ratio:16/9;background:#111;border:1px solid var(--border); }
    .video-wrap iframe { width:100%;height:100%;border:none;display:block; }
    .video-empty { width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#555; }
    .video-empty svg { opacity:.35; }
    .video-empty p { font-size:.82rem; }

    /* Mark complete */
    .complete-bar { display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap; }
    .btn-complete { display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;font-size:.875rem;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-family:inherit;transition:all .15s; }
    .btn-complete:hover { border-color:var(--green);color:var(--green);background:var(--green-bg); }
    .btn-complete.done { background:var(--green-bg);border-color:var(--green);color:var(--green); }
    .nav-btns { display:flex;gap:8px; }

    /* Tabs */
    .tabs { display:flex;border-bottom:1.5px solid var(--border);gap:0; }
    .tab-btn { padding:10px 18px;font-size:.875rem;font-weight:600;background:none;border:none;cursor:pointer;color:var(--muted);font-family:inherit;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;transition:all .12s; }
    .tab-btn:hover { color:var(--text); }
    .tab-btn.active { color:var(--text);border-bottom-color:var(--accent); }

    /* Card */
    .card { background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden; }
    .card-body { padding:20px; }
    .mat-text { font-size:.9rem;line-height:1.75;color:var(--text);white-space:pre-wrap; }
    .mat-empty { color:var(--muted);font-size:.875rem; }
    .mat-textarea { width:100%;min-height:130px;padding:12px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.875rem;line-height:1.65;font-family:inherit;resize:vertical;outline:none;background:var(--bg);color:var(--text);transition:border .15s; }
    .mat-textarea:focus { border-color:var(--accent);background:var(--surface); }

    /* Links */
    .links-list { list-style:none;display:flex;flex-direction:column;gap:6px; }
    .link-row { display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:8px;border:1px solid var(--border); }
    .link-content { flex:1;min-width:0; }
    .link-label { font-size:.75rem;font-weight:600;color:var(--muted); }
    .link-url a { font-size:.875rem;color:var(--accent);text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block; }
    .link-url a:hover { text-decoration:underline; }
    .add-link-form { display:none;flex-direction:column;gap:8px;margin-top:12px; }
    .admin-mode .add-link-form { display:flex; }
    .add-link-row { display:flex;gap:8px;flex-wrap:wrap; }
    .add-link-row input { flex:1;min-width:140px;padding:9px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:.85rem;font-family:inherit;outline:none;background:var(--bg);color:var(--text);transition:border .15s; }
    .add-link-row input:focus { border-color:var(--accent);background:var(--surface); }
    .add-link-row input::placeholder { color:#A8A29E; }

    /* Notes */
    .notes-textarea { width:100%;min-height:160px;padding:14px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;line-height:1.7;font-family:inherit;resize:vertical;outline:none;background:var(--bg);color:var(--text);transition:border .15s; }
    .notes-textarea:focus { border-color:var(--accent);background:var(--surface); }
    .notes-hint { font-size:.75rem;color:var(--muted);margin-top:8px; }
    .notes-saved { font-size:.75rem;color:var(--green);margin-top:6px;opacity:0;transition:opacity .3s; }
    .notes-saved.show { opacity:1; }

    /* Prev/Next nav */
    .lesson-nav { display:flex;justify-content:space-between;gap:12px;margin-top:4px; }
    .nav-card { flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;cursor:pointer;font-family:inherit;text-align:left;transition:all .12s;display:flex;align-items:center;gap:10px; }
    .nav-card:hover { border-color:var(--accent);background:var(--light); }
    .nav-card.next { text-align:right;flex-direction:row-reverse; }
    .nav-card-label { font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em; }
    .nav-card-title { font-size:.85rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .nav-arrow { font-size:1.1rem;color:var(--muted);flex-shrink:0; }
    .nav-card:disabled { opacity:.3;cursor:not-allowed; }
    .nav-card:disabled:hover { border-color:var(--border);background:var(--surface); }

    /* Buttons */
    .btn { padding:9px 18px;border-radius:6px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .12s; }
    .btn-dark { background:var(--accent);color:#fff; }
    .btn-dark:hover { background:var(--accent-h); }
    .btn-outline { background:var(--surface);color:var(--muted);border:1px solid var(--border); }
    .btn-outline:hover { background:var(--light);color:var(--text); }
    .save-row { display:flex;gap:8px;justify-content:flex-end;margin-top:10px; }
    .edit-row { display:flex;justify-content:flex-end;margin-top:10px; }

    /* MODAL */
    .overlay { position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;align-items:center;justify-content:center;padding:20px; }
    .overlay.open { display:flex; }
    .modal { background:var(--surface);border-radius:14px;width:100%;max-width:460px;box-shadow:0 24px 64px rgba(0,0,0,.15);max-height:90dvh;overflow-y:auto; }
    .modal-head { padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1; }
    .modal-head h3 { font-size:1rem;font-weight:700; }
    .modal-x { background:none;border:none;cursor:pointer;color:var(--muted);font-size:1.3rem;line-height:1;padding:2px 6px;border-radius:5px; }
    .modal-x:hover { background:var(--light);color:var(--text); }
    .modal-body { padding:22px;display:flex;flex-direction:column;gap:14px; }
    .modal-foot { padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end; }
    .fgroup { display:flex;flex-direction:column;gap:6px; }
    .fgroup label { font-size:.73rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em; }
    .fgroup input,.fgroup textarea,.fgroup select { padding:10px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:.875rem;font-family:inherit;outline:none;background:var(--bg);color:var(--text);transition:border .15s; }
    .fgroup input:focus,.fgroup textarea:focus,.fgroup select:focus { border-color:var(--accent);background:var(--surface); }
    .fgroup input::placeholder { color:#A8A29E; }
    .fhint { font-size:.73rem;color:var(--muted); }

    /* Toast */
    .toast { position:fixed;bottom:20px;right:20px;background:var(--accent);color:#fff;padding:11px 18px;border-radius:8px;font-size:.84rem;font-weight:500;opacity:0;transform:translateY(6px);transition:all .2s;z-index:300;pointer-events:none; }
    .toast.show { opacity:1;transform:translateY(0); }

    /* BACKDROP */
    .backdrop { display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:85; }

    /* UPLOAD */
    .upload-area { display:flex;flex-direction:column;gap:8px; }
    .upload-btn-label { display:inline-flex;align-items:center;gap:8px;padding:10px 16px;background:var(--light);border:1.5px dashed var(--border);border-radius:8px;font-size:.85rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;width:fit-content; }
    .upload-btn-label:hover { border-color:var(--accent);color:var(--accent);background:#fff; }
    .upload-status { font-size:.78rem;color:var(--muted);min-height:18px; }
    .upload-status.ok { color:var(--green); }
    .upload-status.err { color:var(--danger); }
    .photo-preview-wrap { display:flex;align-items:center;gap:12px;margin-bottom:6px; }
    .photo-preview-wrap img { width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--border); }
    .divider-or { display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.75rem;margin:4px 0; }
    .divider-or::before,.divider-or::after { content:'';flex:1;height:1px;background:var(--border); }
    .file-upload-section { display:none;flex-direction:column;gap:8px;padding:12px;background:var(--bg);border-radius:8px;border:1px dashed var(--border);margin-bottom:8px; }
    .admin-mode .file-upload-section { display:flex; }
    .progress-upload { background:var(--border);border-radius:99px;height:6px;overflow:hidden;margin-top:4px; }
    .progress-upload-fill { height:100%;background:var(--accent);border-radius:99px;transition:width .2s; }

    /* VIDEO PLAYER PROTEGIDO */
    .video-shell { position:relative;border-radius:10px;overflow:hidden;aspect-ratio:16/9;background:#111;border:1px solid var(--border); }
    .video-shell video { width:100%;height:100%;display:block;object-fit:contain; }
    .video-shield { position:absolute;top:0;left:0;right:0;bottom:44px;z-index:2; }
    .video-empty-state { width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#555; }
    .video-empty-state svg { opacity:.35; }
    .video-empty-state p { font-size:.82rem; }

    /* STUDENTS PAGE */
    .students-page { display:flex;flex-direction:column;gap:20px; }
    .students-header { display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap; }
    .students-header h1 { font-size:1.4rem;font-weight:800;letter-spacing:-.02em; }
    .students-info { background:var(--light);border:1px solid var(--border);border-radius:10px;padding:14px 18px;font-size:.85rem;color:var(--muted);line-height:1.6; }
    .students-info strong { color:var(--text); }
    .students-table-wrap { background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden; }
    .students-table { width:100%;border-collapse:collapse; }
    .students-table th { padding:12px 16px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);text-align:left;border-bottom:1px solid var(--border);background:var(--bg); }
    .students-table td { padding:13px 16px;font-size:.85rem;border-bottom:1px solid var(--border); }
    .students-table tr:last-child td { border-bottom:none; }
    .students-table tr:hover td { background:var(--bg); }
    .student-email { font-weight:500; }
    .student-name { color:var(--muted); }
    .student-date { color:var(--muted);font-size:.78rem; }
    .badge { display:inline-block;padding:2px 8px;border-radius:99px;font-size:.72rem;font-weight:600; }
    .badge-green { background:var(--green-bg);color:var(--green); }
    .badge-muted { background:var(--light);color:var(--muted); }
    .students-empty { padding:48px;text-align:center;color:var(--muted);font-size:.9rem; }
    .add-student-form { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px; }
    .add-student-form h3 { font-size:.9rem;font-weight:700;margin-bottom:14px; }
    .add-student-row { display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end; }
    .add-student-row .fgroup { flex:1;min-width:160px; }
    .bulk-add { margin-top:12px; }
    .bulk-textarea { width:100%;min-height:80px;padding:10px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:.82rem;font-family:inherit;resize:vertical;outline:none;background:var(--bg); }
    .bulk-textarea:focus { border-color:var(--accent);background:var(--surface); }
    .sidebar-students-btn { margin:0 12px 10px;padding:9px 12px;background:var(--light);border:1.5px solid var(--border);border-radius:var(--radius);font-size:.82rem;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .12s;text-align:left;display:none; }
    .admin-mode .sidebar-students-btn { display:block; }
    .sidebar-students-btn:hover,.sidebar-students-btn.active { background:var(--accent);color:#fff;border-color:var(--accent); }

    /* RESPONSIVE */
    @media (max-width:768px) {
      .btn-menu { display:flex;align-items:center; }
      aside { transform:translateX(-100%);box-shadow:4px 0 24px rgba(0,0,0,.12); }
      aside.open { transform:translateX(0); }
      .backdrop { display:none; }
      .backdrop.open { display:block; }
      main { margin-left:0;padding:20px 14px; }
      .banner { flex-direction:column;gap:20px;padding:24px; }
      .banner-photo { width:80px;height:80px; }
      .banner-title { font-size:1.35rem; }
      .stats-row { grid-template-columns:1fr 1fr; }
      .lesson-header h1 { font-size:1.2rem; }
      .lesson-nav { flex-direction:column; }
      .nav-card.next { flex-direction:row;text-align:left; }
      .user-email { display:none; }
      .add-link-row { flex-direction:column; }
      .instructor-card { flex-direction:column;align-items:flex-start; }
      .btn-edit-instructor { margin-left:0; }
    }
    @media (min-width:769px) {
      .btn-menu { display:none !important; }
      aside { transform:translateX(0) !important; }
      .backdrop { display:none !important; }
    }
  </style>
</head>
<body>

<div id="authGate"><div class="spinner"></div></div>

<!-- HEADER -->
<header>
  <div class="header-main">
    <button class="btn-menu" id="btnMenu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="logo" id="headerTitle">CLAUDE IA PARA MENTORAS</div>
    <div class="header-right">
      <div class="user-chip">
        <div class="avatar" id="userAvatar">?</div>
        <span class="user-email" id="userEmail"></span>
      </div>
      <button class="btn-sm" id="btnCourses" style="display:none">📚 Cursos</button>
      <button class="btn-sm" id="btnAdmin">Editar</button>
      <button class="btn-sm" id="btnLogout">Sair</button>
    </div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBarFill" style="width:0%"></div></div>
</header>

<div class="backdrop" id="backdrop"></div>

<div class="layout">
  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-search">
      <input class="search-input" id="searchInput" type="text" placeholder="🔍  Buscar aula..." />
    </div>
    <button class="sidebar-overview-btn active" id="btnOverview">🏠  Visão geral</button>
    <button class="sidebar-students-btn" id="btnStudentsPage">👩‍🎓  Alunas</button>
    <div id="modulesNav"></div>
    <div class="sidebar-footer">
      <button class="btn-new-lesson" id="btnNewLesson">+ Nova aula</button>
      <button class="btn-new-module" id="btnNewModule">+ Novo módulo</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main id="main">
    <div class="overview" id="overviewPage"></div>
    <div class="lesson-view" id="lessonPage" style="display:none"></div>
    <div class="students-page" id="studentsPage" style="display:none"></div>
  </main>
</div>

<!-- MODAL: Aula -->
<div class="overlay" id="modalLesson">
  <div class="modal">
    <div class="modal-head"><h3 id="lessonModalTitle">Nova aula</h3><button class="modal-x" data-close="modalLesson">×</button></div>
    <div class="modal-body">
      <div class="fgroup"><label>Título</label><input type="text" id="fTitle" placeholder="Ex: Introdução ao ChatGPT" /></div>
      <div class="fgroup"><label>Módulo</label><select id="fModule"><option value="">— Sem módulo —</option></select></div>
      <div class="fgroup">
        <label>Vídeo da aula</label>
        <div class="upload-area">
          <label class="upload-btn-label" for="videoFileInput">🎬 Enviar vídeo do computador</label>
          <input type="file" id="videoFileInput" accept="video/*" hidden />
          <div id="videoUploadProgress" style="display:none">
            <div class="progress-upload"><div class="progress-upload-fill" id="videoProgressFill" style="width:0%"></div></div>
          </div>
          <div class="upload-status" id="videoUploadStatus"></div>
          <div class="divider-or">ou cole o link do YouTube / Vimeo</div>
          <input type="url" id="fVideo" placeholder="https://youtube.com/watch?v=..." style="padding:9px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:.875rem;font-family:inherit;outline:none;background:var(--bg);width:100%" />
          <span class="fhint">Deixe em branco se ainda não tiver vídeo.</span>
        </div>
      </div>
      <div class="fgroup"><label>Duração (opcional)</label><input type="text" id="fDuration" placeholder="Ex: 12 min" /></div>
      <div class="fgroup"><label>Descrição curta (opcional)</label><input type="text" id="fDesc" placeholder="Ex: Aprenda a usar o ChatGPT do zero" /></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" data-close="modalLesson">Cancelar</button>
      <button class="btn btn-dark" id="saveLessonBtn">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL: Módulo -->
<div class="overlay" id="modalModule">
  <div class="modal">
    <div class="modal-head"><h3 id="moduleModalTitle">Novo módulo</h3><button class="modal-x" data-close="modalModule">×</button></div>
    <div class="modal-body">
      <div class="fgroup"><label>Nome do módulo</label><input type="text" id="fModuleName" placeholder="Ex: Módulo 1 — Fundamentos" /></div>
      <div class="fgroup"><label>Emoji (opcional)</label><input type="text" id="fModuleEmoji" placeholder="Ex: 🚀" maxlength="4" /></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" data-close="modalModule">Cancelar</button>
      <button class="btn btn-dark" id="saveModuleBtn">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL: Instrutora -->
<div class="overlay" id="modalInstructor">
  <div class="modal">
    <div class="modal-head"><h3>Editar perfil da instrutora</h3><button class="modal-x" data-close="modalInstructor">×</button></div>
    <div class="modal-body">
      <div class="fgroup"><label>Nome</label><input type="text" id="fIName" placeholder="Ex: Roberta Alves" /></div>
      <div class="fgroup"><label>Título / Cargo</label><input type="text" id="fITitle" placeholder="Ex: Especialista em IA para Negócios" /></div>
      <div class="fgroup"><label>Bio curta</label><textarea id="fIBio" rows="3" placeholder="Ex: Mentora de IA com foco em resultados reais para empreendedoras digitais."></textarea></div>
      <div class="fgroup">
        <label>Foto da instrutora</label>
        <div class="upload-area">
          <div class="photo-preview-wrap" id="photoPreviewWrap" style="display:none">
            <img id="photoPreviewImg" src="" alt="preview" />
            <span style="font-size:.8rem;color:var(--muted)">Foto selecionada</span>
          </div>
          <label class="upload-btn-label" for="photoFileInput">📷 Escolher foto do computador</label>
          <input type="file" id="photoFileInput" accept="image/*" hidden />
          <div class="upload-status" id="photoUploadStatus"></div>
          <div class="divider-or">ou cole um link direto</div>
          <input type="url" id="fIPhoto" placeholder="https://..." style="padding:9px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:.875rem;font-family:inherit;outline:none;background:var(--bg);width:100%" />
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" data-close="modalInstructor">Cancelar</button>
      <button class="btn btn-dark" id="saveInstructorBtn">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const { createClient } = supabase
const db = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY)
let currentUser = null

// ── DATA ──
const DEFAULTS = {
  instructor: { name: 'Roberta Alves', title: 'Mentora de IA', bio: '', photo: '' },
  modules: [],
  lessons: [],
  progress: {}
}

let data = structuredClone(DEFAULTS)
let currentLessonId = null
let editingLessonId = null
let editingModuleId = null
let adminMode = false
let activeTab = 'material'
let editingMat = false
let notesSaveTimer = null
let currentCourseId = null
let saveTimer = null

function save() {
  clearTimeout(saveTimer)
  saveTimer = setTimeout(syncCourseToSupabase, 800)
}

async function syncCourseToSupabase() {
  if (!currentCourseId || !isAdmin) return
  try {
    const { data: { session } } = await db.auth.getSession()
    await fetch('/api/courses', {
      method: 'PUT',
      headers: { Authorization: `Bearer ${session?.access_token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: currentCourseId, data: { instructor: data.instructor, modules: data.modules, lessons: data.lessons } })
    })
  } catch (e) { console.error('Erro ao salvar no servidor:', e) }
}
const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2)

// ── UTILS ──
function getEmbed(url) {
  if (!url) return null
  try {
    const u = new URL(url)
    if (u.hostname.includes('youtube.com')) { const v = u.searchParams.get('v'); return v ? `https://www.youtube.com/embed/${v}?rel=0` : null }
    if (u.hostname.includes('youtu.be')) { const v = u.pathname.slice(1); return v ? `https://www.youtube.com/embed/${v}?rel=0` : null }
    if (u.hostname.includes('vimeo.com')) { const v = u.pathname.replace('/', ''); return v ? `https://player.vimeo.com/video/${v}` : null }
  } catch {}
  return null
}

function toast(msg, ms = 2200) {
  const el = document.getElementById('toast')
  el.textContent = msg; el.classList.add('show')
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), ms)
}

function getProgress() {
  const total = data.lessons.length
  const done  = data.lessons.filter(l => data.progress[l.id]?.completed).length
  return { total, done, pct: total ? Math.round(done / total * 100) : 0 }
}

function getLessonIndex(id) { return data.lessons.findIndex(l => l.id === id) }

function getModuleLessons(moduleId) {
  return moduleId === '__none__'
    ? data.lessons.filter(l => !l.moduleId)
    : data.lessons.filter(l => l.moduleId === moduleId)
}

// ── UPLOAD (usa servidor para gerar URL assinada, bypassa RLS) ──
async function uploadFile(file, path, bucket = window.STORAGE_BUCKET) {
  const { data: { session } } = await db.auth.getSession()
  const accessToken = session?.access_token
  const res = await fetch('/api/upload-token', {
    method: 'POST',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ bucket, path })
  })
  if (!res.ok) throw new Error('Erro ao obter permissão de upload')
  const { token: uploadToken, path: uploadPath } = await res.json()
  const { error } = await db.storage.from(bucket).uploadToSignedUrl(uploadPath, uploadToken, file, { contentType: file.type })
  if (error) throw error
  const { data } = db.storage.from(bucket).getPublicUrl(path)
  return data.publicUrl
}

// ── VIDEO URL (signed, expira em 2h) ──
async function getVideoUrl(videoValue) {
  if (!videoValue) return null
  // YouTube / Vimeo — usa embed normal
  if (videoValue.startsWith('http')) return { type: 'embed', url: getEmbed(videoValue) }
  // Supabase path — gera signed URL
  const { data, error } = await db.storage.from('videos').createSignedUrl(videoValue, 7200)
  if (error || !data?.signedUrl) return null
  return { type: 'video', url: data.signedUrl }
}

// ── AUTH ──
let isAdmin = false
async function initAuth() {
  const { data: { session } } = await db.auth.getSession()
  if (!session) { window.location.replace('login.html'); return }
  currentUser = session.user
  isAdmin = currentUser.email === window.ADMIN_EMAIL
  const email = currentUser.email || ''
  const name = currentUser.user_metadata?.name || email
  document.getElementById('userEmail').textContent = email
  document.getElementById('userAvatar').textContent = (name[0] || '?').toUpperCase()
  document.getElementById('btnAdmin').style.display = isAdmin ? '' : 'none'
  document.getElementById('btnCourses').style.display = isAdmin ? '' : 'none'
  await loadCourses()
}

// ── CURSOS ──
async function loadCourses() {
  let courses = []
  try {
    if (isAdmin) {
      const { data: d } = await db.from('courses').select('id, name').order('created_at')
      courses = d || []
    } else {
      const { data: d } = await db.from('course_access').select('courses(id, name)').eq('user_id', currentUser.id)
      courses = (d || []).map(a => a.courses).filter(Boolean)
    }
  } catch (e) { console.error(e) }

  document.getElementById('authGate').style.display = 'none'

  if (courses.length === 0) {
    if (isAdmin) {
      showCourseSelection([])
    } else {
      document.querySelector('main').innerHTML = `<div style="padding:80px 20px;text-align:center"><div style="font-size:2.5rem;margin-bottom:16px">🔒</div><h2 style="margin-bottom:8px">Sem acesso</h2><p style="color:var(--muted)">Você ainda não tem acesso a nenhum curso. Entre em contato com a administradora.</p></div>`
    }
    return
  }
  if (courses.length === 1) { await selectCourse(courses[0]); return }
  showCourseSelection(courses)
}

function showCourseSelection(courses) {
  document.querySelector('main').style.display = 'none'
  document.querySelector('aside').style.display = 'none'
  let p = document.getElementById('courseSelPage')
  if (!p) {
    p = document.createElement('div')
    p.id = 'courseSelPage'
    p.style.cssText = 'position:fixed;inset:0;top:56px;background:var(--bg);z-index:150;overflow-y:auto;padding:40px 24px'
    document.body.appendChild(p)
  }
  const grid = courses.map(c => `<div onclick="selectCourse({id:'${c.id}',name:${JSON.stringify(c.name)}})" style="background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:24px 20px;cursor:pointer;transition:border-color .15s" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'"><div style="font-size:1.8rem;margin-bottom:10px">📚</div><div style="font-weight:700;font-size:.95rem">${c.name}</div></div>`).join('')
  const backBtn = currentCourseId ? `<button onclick="voltarCursoAtual()" style="margin-bottom:24px;padding:8px 16px;background:none;border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit;color:var(--muted)">← Voltar ao curso atual</button><br>` : ''
  p.innerHTML = `<div style="max-width:760px;margin:0 auto">${backBtn}<h1 style="font-size:1.3rem;font-weight:800;margin-bottom:6px">Seus cursos</h1><p style="color:var(--muted);margin-bottom:28px;font-size:.9rem">${isAdmin ? 'Selecione o curso para editar ou crie um novo' : 'Selecione um curso para continuar'}</p><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px">${courses.length ? grid : '<p style="color:var(--muted)">Nenhum curso criado ainda.</p>'}</div>${isAdmin ? `<button onclick="showCreateCourse()" style="margin-top:24px;padding:10px 22px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit">+ Criar novo curso</button>` : ''}</div>`
}

function voltarCursoAtual() {
  document.getElementById('courseSelPage')?.remove()
  document.querySelector('main').style.display = ''
  document.querySelector('aside').style.display = ''
  render()
}

async function selectCourse(course) {
  document.getElementById('courseSelPage')?.remove()
  currentCourseId = course.id
  document.getElementById('logo').textContent = course.name || window.SITE_NAME
  document.querySelector('main').style.display = ''
  document.querySelector('aside').style.display = ''

  // Carregar conteúdo do curso do Supabase
  const { data: d } = await db.from('courses').select('data').eq('id', currentCourseId).single()
  if (d?.data && (d.data.lessons?.length || d.data.modules?.length || d.data.instructor?.name)) {
    data.instructor = d.data.instructor || structuredClone(DEFAULTS.instructor)
    data.modules = d.data.modules || []
    data.lessons = d.data.lessons || []
  } else if (isAdmin) {
    // Migrar dados do localStorage para o Supabase (primeira vez)
    const local = JSON.parse(localStorage.getItem('curso_data') || 'null')
    if (local) {
      data.instructor = local.instructor || structuredClone(DEFAULTS.instructor)
      data.modules = local.modules || []
      data.lessons = local.lessons || []
      await syncCourseToSupabase()
      localStorage.removeItem('curso_data')
      toast('✅ Dados migrados para a nuvem!')
    }
  }

  // Carregar progresso do Supabase
  data.progress = {}
  const { data: progRows } = await db.from('user_progress')
    .select('lesson_id, completed, notes')
    .eq('user_id', currentUser.id)
    .eq('course_id', currentCourseId)
  if (progRows) progRows.forEach(r => {
    data.progress[r.lesson_id] = { completed: r.completed || false, notes: r.notes || '' }
  })

  render()
}

async function showCreateCourse() {
  const name = prompt('Nome do novo curso:')
  if (!name?.trim()) return
  const { data: { session } } = await db.auth.getSession()
  const res = await fetch('/api/courses', {
    method: 'POST',
    headers: { Authorization: `Bearer ${session?.access_token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name.trim() })
  })
  const json = await res.json()
  if (json.course) await selectCourse(json.course)
  else alert('Erro: ' + (json.erro || 'tente novamente'))
}

async function saveProgress(lessonId) {
  if (!currentCourseId || !lessonId || !currentUser) return
  const prog = data.progress[lessonId] || {}
  await db.from('user_progress').upsert({
    user_id: currentUser.id,
    course_id: currentCourseId,
    lesson_id: lessonId,
    completed: prog.completed || false,
    notes: prog.notes || '',
    updated_at: new Date().toISOString()
  }, { onConflict: 'user_id,course_id,lesson_id' })
}

db.auth.onAuthStateChange((e, s) => { if (e === 'SIGNED_OUT') window.location.replace('login.html') })
document.getElementById('btnLogout').addEventListener('click', () => db.auth.signOut())
document.getElementById('btnCourses').addEventListener('click', async () => {
  let courses = []
  const { data: d } = await db.from('courses').select('id, name').order('created_at')
  courses = d || []
  showCourseSelection(courses)
})

// ── ADMIN ──
document.getElementById('btnAdmin').addEventListener('click', () => {
  adminMode = !adminMode
  document.getElementById('btnAdmin').classList.toggle('active', adminMode)
  document.getElementById('btnAdmin').textContent = adminMode ? 'Editando ✓' : 'Editar'
  document.body.classList.toggle('admin-mode', adminMode)
  editingMat = false; render()
})

// ── SEARCH ──
document.getElementById('searchInput').addEventListener('input', e => {
  renderModulesNav(e.target.value.toLowerCase())
})

// ── RENDER ──
function render() {
  renderModulesNav()
  updateProgressBar()
  if (currentLessonId) renderLessonPage()
  else renderOverview()
}

function updateProgressBar() {
  const { pct } = getProgress()
  document.getElementById('progressBarFill').style.width = pct + '%'
}

// ── SIDEBAR ──
function renderModulesNav(search = '') {
  const nav = document.getElementById('modulesNav')
  nav.innerHTML = ''

  // Group lessons by module
  const groups = []
  data.modules.forEach(m => {
    const lessons = getModuleLessons(m.id).filter(l => !search || l.title.toLowerCase().includes(search))
    if (lessons.length || adminMode) groups.push({ module: m, lessons })
  })
  const unassigned = data.lessons.filter(l => !l.moduleId && (!search || l.title.toLowerCase().includes(search)))
  if (unassigned.length || (!data.modules.length)) groups.push({ module: null, lessons: unassigned })

  let globalIdx = 0
  groups.forEach(({ module, lessons }) => {
    const section = document.createElement('div')
    section.className = 'module-section'

    if (module) {
      const moduleLessons = getModuleLessons(module.id)
      const doneCnt = moduleLessons.filter(l => data.progress[l.id]?.completed).length
      section.innerHTML = `
        <div class="module-header">
          <span>${module.emoji || '📁'} ${module.title}</span>
          <span class="module-progress-text">${doneCnt}/${moduleLessons.length}</span>
        </div>`
    }

    const ul = document.createElement('ul')
    ul.className = 'lesson-list'

    lessons.forEach(l => {
      globalIdx++
      const done = data.progress[l.id]?.completed
      const li = document.createElement('li')
      li.innerHTML = `
        <button class="lesson-btn${currentLessonId === l.id ? ' active' : ''}${done ? ' done' : ''}" data-id="${l.id}">
          <span class="lesson-num">${done ? '✓' : globalIdx}</span>
          <span class="lesson-info">
            <span class="lesson-name">${l.title}</span>
            ${l.duration ? `<span class="lesson-meta">⏱ ${l.duration}</span>` : ''}
          </span>
          <span class="lesson-actions">
            <button class="icon-btn" data-edit="${l.id}" title="Editar">✏️</button>
            <button class="icon-btn danger" data-del="${l.id}" title="Excluir">🗑️</button>
          </span>
        </button>`
      ul.appendChild(li)
    })

    section.appendChild(ul)
    nav.appendChild(section)
  })

  // events
  nav.querySelectorAll('.lesson-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      if (e.target.closest('[data-edit],[data-del]')) return
      openLesson(btn.dataset.id); closeSidebar()
    })
  })
  nav.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', () => openLessonModal(b.dataset.edit)))
  nav.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', () => deleteLesson(b.dataset.del)))
}

  page.innerHTML = `
    <!-- Banner -->

        <div class="banner-title">${window.SITE_NAME || 'Meu Curso'}</div>
        <div class="banner-instructor">por ${inst.name}${inst.title ? ' · ' + inst.title : ''}</div>
        <div class="banner-stats">
          <div class="banner-stat"><div class="banner-stat-val">${total}</div><div class="banner-stat-label">Aulas</div></div>
          <div class="banner-stat"><div class="banner-stat-val">${done}</div><div class="banner-stat-label">Concluídas</div></div>
          <div class="banner-stat"><div class="banner-stat-val">${pct}%</div><div class="banner-stat-label">Progresso</div></div>
        </div>

      </div>
      ${photoEl}
    </div>

    <!-- Completion -->
    <div class="completion-banner ${allDone ? 'show' : ''}">
      <h3>🎉 Parabéns! Você concluiu o curso!</h3>
      <p>Você completou todas as ${total} aulas. Continue praticando e aplicando o que aprendeu!</p>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card ${done > 0 ? 'green' : ''}">
        <div class="stat-card-val">${done}</div>
        <div class="stat-card-label">Aulas concluídas</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-val">${total - done}</div>
        <div class="stat-card-label">Aulas restantes</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-val">${data.modules.length || '—'}</div>

      </div>
      <div class="stat-card">
        <div class="stat-card-val">${total}</div>
        <div class="stat-card-label">Total de aulas</div>

    <!-- Progress -->

      <h3>Seu progresso</h3>

    </div>

    <!-- Instructor -->
    <div class="instructor-card">
      <div class="instructor-avatar">
        ${inst.photo ? `<img src="${inst.photo}" alt="${inst.name}" onerror="this.style.display='none'">` : '👩‍💼'}
      </div>
      <div style="flex:1;min-width:0">
        <div class="instructor-name">${inst.name}</div>
        ${inst.title ? `<div class="instructor-title">${inst.title}</div>` : ''}

// ── LESSON PAGE ──
function openLesson(id) {
  currentLessonId = id
  activeTab = 'material'
  editingMat = false
  // progresso da última aula salvo no Supabase
  document.getElementById('btnOverview').classList.remove('active')
  document.getElementById('btnStudentsPage').classList.remove('active')
  document.getElementById('overviewPage').style.display = 'none'
  document.getElementById('studentsPage').style.display = 'none'
  renderModulesNav(document.getElementById('searchInput').value.toLowerCase())
  updateProgressBar()
  renderLessonPage()
  closeSidebar()
}

async function renderLessonPage() {
  const lesson = data.lessons.find(l => l.id === currentLessonId)
  const page = document.getElementById('lessonPage')
  if (!lesson) { showOverview(); return }
  page.style.display = 'flex'

  const idx = getLessonIndex(currentLessonId)
  const prev = data.lessons[idx - 1]
  const next = data.lessons[idx + 1]
  const done = !!data.progress[currentLessonId]?.completed
  const prog = data.progress[currentLessonId] || {}

  // ── Vídeo protegido ──
  let videoHtml = ''
  if (lesson.video) {
    const result = await getVideoUrl(lesson.video)
    if (result?.type === 'embed' && result.url) {
      videoHtml = `<div class="video-shell"><iframe src="${result.url}" allowfullscreen title="${lesson.title}" style="width:100%;height:100%;border:none;display:block"></iframe></div>`
    } else if (result?.type === 'video' && result.url) {
      videoHtml = `<div class="video-shell" oncontextmenu="return false">
        <div class="video-shield"></div>
        <video controlsList="nodownload noplaybackrate" disablePictureInPicture oncontextmenu="return false" controls preload="metadata">
          <source src="${result.url}" type="video/mp4">
        </video>
      </div>`
    } else {
      videoHtml = `<div class="video-shell"><div class="video-empty-state"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg><p>Erro ao carregar vídeo.</p></div></div>`
    }
  } else {
    videoHtml = `<div class="video-shell"><div class="video-empty-state">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <p>${adminMode ? 'Adicione um vídeo editando esta aula' : 'Vídeo em breve'}</p>
    </div></div>`
  }

  // Tab content
  const links = lesson.links || []
  let tabContent = ''
  if (activeTab === 'material') {
    tabContent = editingMat
      ? `<textarea class="mat-textarea" id="matEditor">${lesson.materials || ''}</textarea>
         <div class="save-row">
           <button class="btn btn-outline" id="btnCancelMat">Cancelar</button>
           <button class="btn btn-dark" id="btnSaveMat">Salvar</button>
         </div>`
      : `<div class="${lesson.materials ? 'mat-text' : 'mat-empty'}">${lesson.materials || 'Nenhum material adicionado ainda.'}</div>
         ${adminMode ? `<div class="edit-row"><button class="btn btn-outline" id="btnEditMat">✏️ Editar material</button></div>` : ''}`
  } else if (activeTab === 'links') {
    const linksHtml = links.length === 0
      ? `<p class="mat-empty">Nenhum link adicionado ainda.</p>`
      : `<ul class="links-list">${links.map(lk => `
          <li class="link-row">
            <div class="link-content">
              ${lk.label ? `<div class="link-label">${lk.label}</div>` : ''}
              <div class="link-url"><a href="${lk.url}" target="_blank" rel="noopener">${lk.url}</a></div>
            </div>
            ${adminMode ? `<button class="icon-btn danger" data-dellink="${lk.id}">✕</button>` : ''}
          </li>`).join('')}</ul>`
    tabContent = `${linksHtml}
      <div class="add-link-form">
        <div class="file-upload-section">
          <div style="font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">📎 Enviar arquivo do computador</div>
          <label class="upload-btn-label" for="fileUploadInput">Escolher arquivo (PDF, imagem, doc...)</label>
          <input type="file" id="fileUploadInput" accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.jpg,.jpeg,.png,.gif,.mp4,.zip,.txt,.csv" hidden />
          <div class="upload-status" id="fileUploadStatus"></div>
        </div>
        <div class="divider-or" style="display:none" id="linkOrDivider">ou adicione um link</div>
        <div class="add-link-row">
          <input type="text" id="linkLabel" placeholder="Nome (ex: Apostila)" />
          <input type="url" id="linkUrl" placeholder="https://..." />
        </div>
        <div><button class="btn btn-dark" id="btnAddLink">+ Adicionar link manual</button></div>
      </div>`
  } else if (activeTab === 'notas') {
    tabContent = `
      <textarea class="notes-textarea" id="notesArea" placeholder="Escreva suas anotações sobre esta aula aqui...">${prog.notes || ''}</textarea>
      <div class="notes-hint">Suas anotações são salvas automaticamente.</div>
      <div class="notes-saved" id="notesSaved">✓ Anotações salvas</div>`
  }

  page.innerHTML = `
    <div class="lesson-header">
      <div>
        <h1>${lesson.title}</h1>
        ${lesson.desc ? `<p class="lesson-desc-text">${lesson.desc}</p>` : ''}
        ${lesson.duration ? `<p class="lesson-duration">⏱ ${lesson.duration}</p>` : ''}
      </div>
    </div>

    ${videoHtml}

    <div class="complete-bar">
      <button class="btn-complete${done ? ' done' : ''}" id="btnComplete">
        ${done ? '✅ Aula concluída' : '☐ Marcar como concluída'}
      </button>
      <div class="nav-btns">
        <button class="btn btn-outline" id="btnPrev" ${!prev ? 'disabled' : ''}>← Anterior</button>
        <button class="btn btn-dark" id="btnNext" ${!next ? 'disabled' : ''}>Próxima →</button>
      </div>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab-btn${activeTab === 'material' ? ' active' : ''}" data-tab="material">📄 Material</button>
        <button class="tab-btn${activeTab === 'links' ? ' active' : ''}" data-tab="links">🔗 Links ${links.length > 0 ? `(${links.length})` : ''}</button>
        <button class="tab-btn${activeTab === 'notas' ? ' active' : ''}" data-tab="notas">📝 Anotações</button>
      </div>
      <div class="card-body">${tabContent}</div>
    </div>

    <div class="lesson-nav">
      ${prev ? `<button class="nav-card" id="navPrev"><span class="nav-arrow">←</span><div><div class="nav-card-label">Anterior</div><div class="nav-card-title">${prev.title}</div></div></button>` : `<div></div>`}
      ${next ? `<button class="nav-card next" id="navNext"><span class="nav-arrow">→</span><div><div class="nav-card-label">Próxima</div><div class="nav-card-title">${next.title}</div></div></button>` : `<div></div>`}
    </div>
  `

  // EVENTS
  document.getElementById('btnComplete').addEventListener('click', () => {
    if (!data.progress[currentLessonId]) data.progress[currentLessonId] = {}
    data.progress[currentLessonId].completed = !data.progress[currentLessonId].completed
    data.progress[currentLessonId].completedAt = new Date().toISOString()
    save(); render(); saveProgress(currentLessonId)
    toast(data.progress[currentLessonId].completed ? '✅ Aula marcada como concluída!' : 'Aula desmarcada.')
  })
  document.getElementById('btnPrev')?.addEventListener('click', () => prev && openLesson(prev.id))
  document.getElementById('btnNext')?.addEventListener('click', () => next && openLesson(next.id))
  document.getElementById('navPrev')?.addEventListener('click', () => prev && openLesson(prev.id))
  document.getElementById('navNext')?.addEventListener('click', () => next && openLesson(next.id))

  page.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => { activeTab = btn.dataset.tab; renderLessonPage() })
  })
  document.getElementById('btnEditMat')?.addEventListener('click', () => { editingMat = true; renderLessonPage() })
  document.getElementById('btnCancelMat')?.addEventListener('click', () => { editingMat = false; renderLessonPage() })
  document.getElementById('btnSaveMat')?.addEventListener('click', () => {
    lesson.materials = document.getElementById('matEditor').value
    save(); editingMat = false; renderLessonPage(); toast('Material salvo!')
  })
  document.getElementById('btnAddLink')?.addEventListener('click', () => {
    const label = document.getElementById('linkLabel').value.trim()
    const url   = document.getElementById('linkUrl').value.trim()
    if (!url) { toast('Informe a URL do link.'); return }
    if (!lesson.links) lesson.links = []
    lesson.links.push({ id: uid(), label, url })
    save(); renderLessonPage(); toast('Link adicionado!')
  })
  page.querySelectorAll('[data-dellink]').forEach(b => {
    b.addEventListener('click', () => {
      lesson.links = (lesson.links || []).filter(l => l.id !== b.dataset.dellink)
      save(); renderLessonPage()
    })
  })
  // Mostrar divisor "ou" no modo admin
  if (adminMode) document.getElementById('linkOrDivider')?.style.setProperty('display','flex')
  // Upload de arquivo na aula
  document.getElementById('fileUploadInput')?.addEventListener('change', async (e) => {
    const file = e.target.files[0]
    if (!file) return
    const statusEl = document.getElementById('fileUploadStatus')
    statusEl.textContent = `Enviando ${file.name}...`
    statusEl.className = 'upload-status'
    try {
      const safeName = file.name.replace(/\s+/g, '_').replace(/[^\w.-]/g, '')
      const path = `lessons/${currentLessonId}/${Date.now()}_${safeName}`
      const url = await uploadFile(file, path)
      if (!lesson.links) lesson.links = []
      lesson.links.push({ id: uid(), label: file.name, url })
      save(); renderLessonPage(); toast('✅ Arquivo enviado!')
    } catch (err) {
      statusEl.textContent = '❌ Erro ao enviar. Tente novamente.'
      statusEl.className = 'upload-status err'
    }
  })
  // Notes auto-save
  const notesEl = document.getElementById('notesArea')
  if (notesEl) {
    notesEl.addEventListener('input', () => {
      clearTimeout(notesSaveTimer)
      notesSaveTimer = setTimeout(() => {
        if (!data.progress[currentLessonId]) data.progress[currentLessonId] = {}
        data.progress[currentLessonId].notes = notesEl.value
        save(); saveProgress(currentLessonId)
        const el = document.getElementById('notesSaved')
        if (el) { el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 1500) }
      }, 600)
    })
  }
}

function showOverview() {
  currentLessonId = null
  document.getElementById('lessonPage').style.display = 'none'
  document.getElementById('studentsPage').style.display = 'none'
  document.getElementById('overviewPage').style.display = 'flex'
  document.getElementById('btnOverview').classList.add('active')
  document.getElementById('btnStudentsPage').classList.remove('active')
  renderModulesNav(); renderOverview(); updateProgressBar()
}

// ── STUDENTS PAGE ──
async function showStudentsPage() {
  currentLessonId = null
  document.getElementById('lessonPage').style.display = 'none'
  document.getElementById('overviewPage').style.display = 'none'
  document.getElementById('btnOverview').classList.remove('active')
  document.getElementById('btnStudentsPage').classList.add('active')
  const page = document.getElementById('studentsPage')
  page.style.display = 'flex'
  page.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">Carregando alunas...</div>`
  closeSidebar()

  const { data: { session } } = await db.auth.getSession()
  const token = session?.access_token

  // Buscar alunas, cursos e acessos em paralelo
  let students = [], allCourses = [], allAccess = []
  try {
    const [sRes, cRes, aRes] = await Promise.all([
      fetch('/api/students', { headers: { Authorization: `Bearer ${token}` } }),
      fetch('/api/courses', { headers: { Authorization: `Bearer ${token}` } }),
      fetch('/api/courses?action=access', { headers: { Authorization: `Bearer ${token}` } })
    ])
    students = (await sRes.json()).students || []
    allCourses = (await cRes.json()).courses || []
    allAccess = (await aRes.json()).access || []
  } catch {}

  const formatDate = d => d ? new Date(d).toLocaleDateString('pt-BR') : '—'

  // Para cada aluna, quais cursos ela tem acesso
  const accessMap = {}
  allAccess.forEach(a => {
    if (!accessMap[a.user_id]) accessMap[a.user_id] = new Set()
    accessMap[a.user_id].add(a.course_id)
  })

  const courseBadges = (studentId) => allCourses.map(c => {
    const has = accessMap[studentId]?.has(c.id)
    return `<button onclick="toggleAccess('${studentId}','${c.id}',${has},'${token}')" title="${has ? 'Remover acesso' : 'Dar acesso'}" style="padding:3px 9px;border-radius:99px;font-size:.72rem;font-weight:600;cursor:pointer;border:1.5px solid ${has ? 'var(--green)' : 'var(--border)'};background:${has ? 'var(--green-bg)' : 'var(--surface)'};color:${has ? 'var(--green)' : 'var(--muted)'};">${c.name}</button>`
  }).join(' ')

  const rowsHtml = students.length === 0
    ? `<tr><td colspan="5" class="students-empty">Nenhuma aluna cadastrada ainda.</td></tr>`
    : students.map(s => `<tr>
        <td><div class="student-email">${s.email}</div>${s.name ? `<div class="student-name">${s.name}</div>` : ''}</td>
        <td class="student-date">${formatDate(s.created_at)}</td>
        <td class="student-date">${s.last_sign_in ? formatDate(s.last_sign_in) : '<span class="badge badge-muted">Nunca acessou</span>'}</td>
        <td style="white-space:nowrap">${allCourses.length ? courseBadges(s.id) : '<span style="color:var(--muted);font-size:.78rem">—</span>'}</td>
        <td><button class="btn btn-outline" style="font-size:.75rem;padding:5px 10px;color:var(--danger);border-color:#FECACA" data-delstudent="${s.id}" data-email="${s.email}">Remover</button></td>
      </tr>`).join('')

  page.innerHTML = `
    <div class="students-header">
      <h1>👩‍🎓 Alunas</h1>
      <span style="font-size:.85rem;color:var(--muted)">${students.length} cadastrada${students.length !== 1 ? 's' : ''}</span>
    </div>

    <div class="students-info">
      <strong>Senha padrão de acesso:</strong> <code style="background:var(--border);padding:2px 8px;border-radius:4px;font-family:monospace">Mentoras@2024</code><br>
      As alunas podem trocar a senha após o primeiro acesso. Clique no nome do curso ao lado de cada aluna para dar ou remover acesso.
    </div>

    <div class="add-student-form">
      <h3>Adicionar aluna</h3>
      <div class="add-student-row">
        <div class="fgroup"><label>Nome (opcional)</label><input type="text" id="newStudentName" placeholder="Ex: Maria Silva" /></div>
        <div class="fgroup"><label>E-mail *</label><input type="email" id="newStudentEmail" placeholder="aluna@email.com" /></div>
        <button class="btn btn-dark" id="btnAddStudent" style="margin-bottom:0;height:40px;align-self:flex-end">+ Adicionar</button>
      </div>
      <div class="upload-status" id="addStudentStatus" style="margin-top:8px"></div>
      <div class="bulk-add" style="margin-top:16px">
        <div style="font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Adicionar várias de uma vez</div>
        <textarea class="bulk-textarea" id="bulkEmails" placeholder="Cole os e-mails, um por linha:&#10;maria@email.com&#10;joana@email.com&#10;ana@email.com"></textarea>
        <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
          <button class="btn btn-outline" id="btnBulkAdd">Adicionar todas</button>
          <div class="upload-status" id="bulkStatus"></div>
        </div>
      </div>
    </div>

    <div class="students-table-wrap">
      <table class="students-table">
        <thead><tr>
          <th>Aluna</th><th>Cadastrada em</th><th>Último acesso</th><th>Cursos</th><th></th>
        </tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>`

  document.getElementById('btnAddStudent').addEventListener('click', () => addStudent(token))
  document.getElementById('newStudentEmail').addEventListener('keydown', e => { if (e.key === 'Enter') addStudent(token) })
  document.getElementById('btnBulkAdd').addEventListener('click', () => bulkAddStudents(token))
  page.querySelectorAll('[data-delstudent]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm(`Remover ${btn.dataset.email}?`)) return
      const res = await fetch('/api/students', {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: btn.dataset.delstudent })
      })
      if (res.ok) { toast('Aluna removida.'); showStudentsPage() }
      else toast('Erro ao remover.')
    })
  })
}

async function toggleAccess(userId, courseId, hasAccess, token) {
  const method = hasAccess ? 'DELETE' : 'POST'
  await fetch('/api/courses?action=access', {
    method,
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId, courseId })
  })
  toast(hasAccess ? 'Acesso removido.' : '✅ Acesso concedido!')
  showStudentsPage()
}

async function addStudent(token) {
  const email = document.getElementById('newStudentEmail').value.trim()
  const name  = document.getElementById('newStudentName').value.trim()
  const status = document.getElementById('addStudentStatus')
  if (!email) { status.textContent = 'Informe o e-mail.'; status.className = 'upload-status err'; return }
  status.textContent = 'Adicionando...'; status.className = 'upload-status'
  const res = await fetch('/api/students', {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, name })
  })
  const json = await res.json()
  if (res.ok) {
    status.textContent = `✓ ${email} adicionada! E-mail de boas-vindas enviado.`
    status.className = 'upload-status ok'
    document.getElementById('newStudentEmail').value = ''
    document.getElementById('newStudentName').value = ''
    setTimeout(() => showStudentsPage(), 1200)
  } else {
    status.textContent = json.erro || 'Erro ao adicionar.'
    status.className = 'upload-status err'
  }
}

async function bulkAddStudents(token) {
  const lines = document.getElementById('bulkEmails').value.split('\n').map(l => l.trim()).filter(Boolean)
  if (!lines.length) return
  const status = document.getElementById('bulkStatus')
  status.textContent = `Adicionando ${lines.length} alunas...`; status.className = 'upload-status'
  let ok = 0, fail = 0
  for (const email of lines) {
    const res = await fetch('/api/students', {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    })
    res.ok ? ok++ : fail++
  }
  status.textContent = `✓ ${ok} adicionada${ok !== 1 ? 's' : ''}${fail ? ` · ${fail} erro(s)` : ''}.`
  status.className = 'upload-status ok'
  setTimeout(() => showStudentsPage(), 1500)
}

// ── LESSON MODAL ──
function openLessonModal(editId = null) {
  editingLessonId = editId
  const l = editId ? data.lessons.find(x => x.id === editId) : null
  document.getElementById('lessonModalTitle').textContent = l ? 'Editar aula' : 'Nova aula'
  document.getElementById('fTitle').value    = l?.title    || ''
  document.getElementById('fVideo').value    = l?.video    || ''
  document.getElementById('fDuration').value = l?.duration || ''
  document.getElementById('fDesc').value     = l?.desc     || ''
  // populate modules
  const sel = document.getElementById('fModule')
  sel.innerHTML = '<option value="">— Sem módulo —</option>'
  data.modules.forEach(m => {
    const opt = document.createElement('option')
    opt.value = m.id; opt.textContent = m.title
    if (l?.moduleId === m.id) opt.selected = true
    sel.appendChild(opt)
  })
  document.getElementById('modalLesson').classList.add('open')
  document.getElementById('fTitle').focus()
}

document.getElementById('saveLessonBtn').addEventListener('click', () => {
  const title = document.getElementById('fTitle').value.trim()
  if (!title) { toast('Informe o título da aula.'); return }
  const video    = document.getElementById('fVideo').value.trim()
  const duration = document.getElementById('fDuration').value.trim()
  const desc     = document.getElementById('fDesc').value.trim()
  const moduleId = document.getElementById('fModule').value || null
  if (editingLessonId) {
    const l = data.lessons.find(x => x.id === editingLessonId)
    Object.assign(l, { title, video, duration, desc, moduleId })
  } else {
    data.lessons.push({ id: uid(), title, video, duration, desc, moduleId, materials: '', links: [] })
  }
  save(); closeModal('modalLesson'); render()
  toast(editingLessonId ? 'Aula atualizada!' : 'Aula criada!')
})
document.getElementById('fTitle').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('saveLessonBtn').click() })

function deleteLesson(id) {
  if (!confirm('Excluir esta aula?')) return
  data.lessons = data.lessons.filter(l => l.id !== id)
  delete data.progress[id]
  if (currentLessonId === id) currentLessonId = null
  save(); render()
  toast('Aula excluída.')
}

// ── MODULE MODAL ──
function openModuleModal(editId = null) {
  editingModuleId = editId
  const m = editId ? data.modules.find(x => x.id === editId) : null
  document.getElementById('moduleModalTitle').textContent = m ? 'Editar módulo' : 'Novo módulo'
  document.getElementById('fModuleName').value  = m?.title || ''
  document.getElementById('fModuleEmoji').value = m?.emoji || ''
  document.getElementById('modalModule').classList.add('open')
  document.getElementById('fModuleName').focus()
}

document.getElementById('saveModuleBtn').addEventListener('click', () => {
  const title = document.getElementById('fModuleName').value.trim()
  if (!title) { toast('Informe o nome do módulo.'); return }
  const emoji = document.getElementById('fModuleEmoji').value.trim()
  if (editingModuleId) {
    const m = data.modules.find(x => x.id === editingModuleId)
    Object.assign(m, { title, emoji })
  } else {
    data.modules.push({ id: uid(), title, emoji })
  }
  save(); closeModal('modalModule'); render()
  toast(editingModuleId ? 'Módulo atualizado!' : 'Módulo criado!')
})

// ── INSTRUCTOR MODAL ──
function openInstructorModal() {
  const inst = data.instructor
  document.getElementById('fIName').value  = inst.name  || ''
  document.getElementById('fITitle').value = inst.title || ''
  document.getElementById('fIBio').value   = inst.bio   || ''
  document.getElementById('fIPhoto').value = inst.photo || ''
  document.getElementById('modalInstructor').classList.add('open')
}
document.getElementById('saveInstructorBtn').addEventListener('click', () => {
  data.instructor = {
    name:  document.getElementById('fIName').value.trim(),
    title: document.getElementById('fITitle').value.trim(),
    bio:   document.getElementById('fIBio').value.trim(),
    photo: document.getElementById('fIPhoto').value.trim()
  }
  save(); closeModal('modalInstructor'); render(); toast('Perfil atualizado!')
})

// Upload de foto da instrutora
document.getElementById('photoFileInput').addEventListener('change', async (e) => {
  const file = e.target.files[0]
  if (!file) return
  // Preview imediato
  const reader = new FileReader()
  reader.onload = ev => {
    document.getElementById('photoPreviewImg').src = ev.target.result
    document.getElementById('photoPreviewWrap').style.display = 'flex'
  }
  reader.readAsDataURL(file)
  // Upload para Supabase
  const statusEl = document.getElementById('photoUploadStatus')
  statusEl.textContent = 'Enviando foto...'
  statusEl.className = 'upload-status'
  try {
    const ext = file.name.split('.').pop().toLowerCase()
    const url = await uploadFile(file, `instructor/photo.${ext}`)
    document.getElementById('fIPhoto').value = url
    statusEl.textContent = '✓ Foto enviada! Clique em Salvar.'
    statusEl.className = 'upload-status ok'
  } catch (err) {
    statusEl.textContent = '❌ Erro ao enviar. Cole o link da foto abaixo.'
    statusEl.className = 'upload-status err'
  }
})

// ── BUTTONS ──
document.getElementById('btnNewLesson').addEventListener('click', () => openLessonModal())
document.getElementById('btnNewModule').addEventListener('click', () => openModuleModal())
document.getElementById('btnOverview').addEventListener('click', showOverview)
document.getElementById('btnStudentsPage').addEventListener('click', showStudentsPage)

// ── UPLOAD DE VÍDEO na modal de aula ──
document.getElementById('videoFileInput').addEventListener('change', async (e) => {
  const file = e.target.files[0]
  if (!file) return
  const statusEl = document.getElementById('videoUploadStatus')
  const progressEl = document.getElementById('videoUploadProgress')
  const fillEl = document.getElementById('videoProgressFill')

  if (file.size > 5 * 1024 * 1024 * 1024) {
    statusEl.textContent = '❌ Arquivo muito grande (máx 5 GB).'; statusEl.className = 'upload-status err'; return
  }

  statusEl.textContent = 'Enviando vídeo... (pode levar alguns minutos)'; statusEl.className = 'upload-status'
  progressEl.style.display = 'block'

  // Simula progresso visual enquanto faz upload
  let fakeProgress = 0
  const fakeTimer = setInterval(() => {
    fakeProgress = Math.min(fakeProgress + Math.random() * 3, 85)
    fillEl.style.width = fakeProgress + '%'
  }, 400)

  try {
    const safeName = file.name.replace(/\s+/g, '_').replace(/[^\w.-]/g, '')
    const path = `aulas/${Date.now()}_${safeName}`
    const { data: { session } } = await db.auth.getSession()
    const accessToken = session?.access_token
    const tokenRes = await fetch('/api/upload-token', {
      method: 'POST',
      headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ bucket: 'videos', path })
    })
    if (!tokenRes.ok) throw new Error('Erro ao obter permissão de upload')
    const { token: uploadToken, path: uploadPath } = await tokenRes.json()
    const { error } = await db.storage.from('videos').uploadToSignedUrl(uploadPath, uploadToken, file)
    clearInterval(fakeTimer)
    if (error) throw error
    fillEl.style.width = '100%'
    document.getElementById('fVideo').value = path   // guarda o path, não URL
    statusEl.textContent = '✅ Vídeo enviado! Clique em Salvar.'
    statusEl.className = 'upload-status ok'
  } catch (err) {
    clearInterval(fakeTimer)
    progressEl.style.display = 'none'
    statusEl.textContent = '❌ Erro ao enviar: ' + (err.message || 'tente novamente.')
    statusEl.className = 'upload-status err'
  }
})

// ── MODALS ──
function closeModal(id) {
  document.getElementById(id).classList.remove('open')
  editingLessonId = null; editingModuleId = null
}
document.querySelectorAll('[data-close]').forEach(btn => {
  btn.addEventListener('click', () => closeModal(btn.dataset.close))
})
document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) closeModal(el.id) })
})

// ── MOBILE SIDEBAR ──
document.getElementById('btnMenu').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open')
  document.getElementById('backdrop').classList.toggle('open')
})
document.getElementById('backdrop').addEventListener('click', closeSidebar)
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open')
  document.getElementById('backdrop').classList.remove('open')
}
